<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>unused-marker-def</title></head>
<body>
<main>
  <svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
    <!-- GATE-D FAIL: <marker id="arrow-orphan"> defined but no marker-end="url(#arrow-orphan)" -->
    <rect width="100%" height="100%" fill="#f8f5ed"/>
    <defs>
      <marker id="arrow-orphan" viewBox="0 0 10 10" refX="9" refY="5"
              markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M0,0 L10,5 L0,10 Z" fill="#222"/>
      </marker>
    </defs>
    <line x1="100" y1="100" x2="300" y2="100" stroke="#222"/>
    <line x1="0" y1="450" x2="800" y2="450" stroke="#222" stroke-width="0.5"/>
    <text x="20" y="475" font-family="monospace" font-size="10">LEGEND: orphan</text>
  </svg>
</main>
</body>
</html>
