<!DOCTYPE html>
<html lang="{{LANG}}">
<!--
  golden-template-swiss.html — book skill reference template (Swiss preset)
  Design system: Swiss / International Typographic Style
  Purpose: Show-by-example the structure, tokens, and SVG style that
           every Swiss-preset book output must follow.

  Token source: project root DESIGN.md (Layer 1) →
                design-token-resolver.md Layer 2 (Swiss preset) →
                per-type derived rules (Layer 3).
  All token values rendered to SVG/CSS MUST be solid hex (`^#[0-9a-fA-F]{3,8}$`);
  `rgba(` MUST NOT appear in any rendered output.

  Swiss invariants honored here:
    - No italics anywhere (figcaption uses upright)
    - No serif fallback in body stack (Inter / Helvetica Neue / Noto Sans TC)
    - No dropcap demo (Swiss preset禁 dropcap)
    - IKB (#002FA7) as accent / focal stroke
    - Editorial standards retained: text-wrap pretty + curly quotes

  TEMPLATE SLOTS (replace when generating):
    {{LANG}}          → zh-TW or en
    {{TITLE}}         → document title
    {{KICKER}}        → 2–4 word category label
    {{SUBTITLE}}      → one-sentence summary
    {{SOURCE_URL}}    → original source URL
    {{CAPTURED_AT}}   → ISO 8601 date
    {{TOC_ITEMS}}     → <a href="#s1">...</a> list of section links
    {{SECTIONS}}      → rendered <section id="sN"> blocks
    {{FOOTER_LABEL}}  → e.g. "整理自 @author · Original Title"
-->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
  /* ── Swiss design tokens (Layer 2, solid hex) ──
     Source of truth: references/design-token-resolver.md §Layer 2 (Swiss row).
     IKB accent, off-white paper, ink-near-black text, hairline rules. */
  :root {
    --paper:             #f5f5f1;  /* primary background — off-white */
    --ivory:             #ffffff;  /* card / panel surface — pure white */
    --warm-sand:         #ebebe6;  /* button / interactive surface */
    --dark-surface:      #1a1a1a;  /* dark container */
    --deep-dark:         #0a0a0a;  /* dark page background */
    --accent:            #002FA7;  /* IKB — accent / focal stroke */
    --accent-light:      #3355BB;  /* link on dark surface */
    --near-black:        #111111;  /* primary text */
    --dark-warm:         #2a2a2a;  /* secondary text */
    --olive:             #444444;  /* subtext / muted ink */
    --stone:             #6a6a6a;  /* tertiary text / metadata */
    --charcoal:          #333333;  /* dark muted text */
    --border:            #d8d8d2;  /* primary border */
    --border-soft:       #e2e2dc;  /* secondary border */
    --brand-tint:        #DDE2EF;  /* IKB-tint, focal fill */
    --brand-tint-strong: #C9D1E5;  /* tag background, standard */
    /* Aliases for class hooks (do NOT use in SVG attributes;
       SVG attributes must reference solid hex via the resolver). */
    --line:              #e2e2dc;
    --hover:             #ebebe6;
    --accent-bg:         #DDE2EF;  /* solid-hex equivalent of IKB@7%-on-paper */
    --warm-bg:           #f0ece4;  /* solid-hex equivalent of warm@8%-on-paper */
    --warn-border:       #b05c28;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--paper);
    /* Swiss invariant: sans-serif only; no serif fallback. */
    font-family: 'Inter', 'Helvetica Neue', 'Noto Sans TC', sans-serif;
    color: var(--near-black);
    line-height: 1.6;
    font-size: 16px;
    text-wrap: pretty;
  }

  /* ── Paper sheet ──
     Swiss preset: minimal shadow, sharp 0-radius corners, hairline border. */
  .paper {
    background: var(--ivory);
    max-width: 760px;
    margin: 40px auto 80px;
    padding: 64px 72px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
    border-radius: 0;
    border: 1px solid var(--border-soft);
    position: relative;
  }

  /* ── Sticky TOC sidebar ── */
  .toc-wrap {
    position: fixed;
    top: 48px;
    left: calc(50% - 380px - 200px);
    width: 180px;
    display: none;
  }
  @media (min-width: 1160px) { .toc-wrap { display: block; } }
  .toc-wrap h3 {
    font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--stone); margin-bottom: 10px;
  }
  .toc-wrap a {
    display: block; padding: 3px 0 3px 8px;
    font-size: 12.5px; line-height: 1.55;
    text-decoration: none;
    color: var(--olive);
    border-left: 2px solid transparent;
    transition: color .15s, border-color .15s;
  }
  .toc-wrap a:hover, .toc-wrap a.active {
    color: var(--accent); border-left-color: var(--accent);
  }

  /* ── Header ── */
  .kicker {
    font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 14px;
    font-weight: 600;
  }
  h1 {
    font-size: 32px; font-weight: 700; line-height: 1.15;
    letter-spacing: -.02em; margin-bottom: 12px;
    text-wrap: pretty;
  }
  .subtitle {
    font-size: 15.5px; color: var(--dark-warm);
    margin-bottom: 32px; padding-bottom: 32px;
    border-bottom: 1px solid var(--line);
  }
  .meta {
    display: block; margin-top: 6px;
    font-size: 12px; color: var(--stone);
  }

  /* ── Sections ── */
  section { margin-bottom: 52px; }
  section:last-of-type { margin-bottom: 0; }

  h2 {
    font-size: 18px; font-weight: 700;
    margin-bottom: 16px; padding-bottom: 8px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 10px;
    text-wrap: pretty;
    letter-spacing: -.005em;
  }
  .sec-num {
    font-size: 10px; font-weight: 600; letter-spacing: .08em;
    color: var(--accent); background: var(--accent-bg);
    padding: 2px 8px; border-radius: 0; flex-shrink: 0;
  }

  p { margin-bottom: 14px; text-wrap: pretty; }
  p:last-child { margin-bottom: 0; }
  strong { font-weight: 700; }

  /* ── Callout variants ── */
  .callout {
    background: var(--accent-bg);
    border-left: 3px solid var(--accent);
    padding: 14px 18px; margin: 20px 0;
    font-size: 14.5px;
    border-radius: 0;
  }
  .callout.warm {
    background: var(--warm-bg);
    border-left-color: var(--warn-border);
  }

  /* ── SVG figures ── */
  figure.diagram {
    margin: 28px 0; text-align: center;
  }
  /* Swiss invariant: no italic on figcaption. */
  figure.diagram figcaption {
    font-size: 12px; color: var(--stone);
    margin-top: 8px;
    font-style: normal;
    letter-spacing: .02em;
  }
  svg { display: block; margin: 0 auto; max-width: 100%; }

  /* ── Comparison table ── */
  table.cmp {
    width: 100%; border-collapse: collapse;
    font-size: 14px; margin: 20px 0;
  }
  table.cmp th {
    padding: 8px 14px; text-align: left;
    font-size: 11px; letter-spacing: .06em; text-transform: uppercase;
    background: var(--hover); color: var(--olive);
    border-bottom: 1px solid var(--accent);
  }
  table.cmp td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--line);
    vertical-align: top;
  }
  table.cmp tr:last-child td { border-bottom: none; }
  .badge {
    display: inline-block; font-size: 10px; letter-spacing: .04em;
    padding: 1px 7px; border-radius: 0; vertical-align: middle; margin-left: 4px;
  }
  .badge.yes { background: var(--accent-bg); color: var(--accent); }
  .badge.no  { background: var(--hover); color: var(--stone); }

  /* ── Card grid ── */
  .card-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 20px 0;
  }
  .card {
    border: 1px solid var(--line); border-radius: 0;
    padding: 16px 18px;
    transition: box-shadow .15s, transform .15s;
  }
  .card:hover {
    box-shadow: 0 4px 12px rgba(17,17,17,0.08);
    transform: translateY(-1px);
  }
  .card h3 {
    font-size: 13px; font-weight: 700; margin-bottom: 8px;
    display: flex; align-items: center; gap: 7px;
  }
  .card p { font-size: 13px; color: var(--dark-warm); margin: 0; }
  .card .icon {
    width: 22px; height: 22px; border-radius: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0;
    background: var(--accent-bg); color: var(--accent);
  }

  /* ── Footer ── */
  footer {
    margin-top: 52px; padding-top: 24px;
    border-top: 1px solid var(--line);
    font-size: 12px; color: var(--stone);
    display: flex; justify-content: space-between; align-items: center;
  }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .paper { padding: 40px 28px; margin: 0; border-radius: 0; }
    .card-grid { grid-template-columns: 1fr; }
  }
  /* ── Motion safety — honor the OS reduce-motion preference ── */
  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    * { transition: none !important; }
  }
</style>
</head>
<body>

<!-- TOC sidebar (auto-populated) -->
<nav class="toc-wrap" id="toc">
  <h3>目錄</h3>
  {{TOC_ITEMS}}
</nav>

<article class="paper">

  <header>
    <p class="kicker">{{KICKER}}</p>
    <h1>{{TITLE}}</h1>
    <p class="subtitle">
      {{SUBTITLE}}
      <span class="meta">來源：<a href="{{SOURCE_URL}}">{{SOURCE_URL}}</a> · {{CAPTURED_AT}}</span>
    </p>
  </header>

  {{SECTIONS}}

  <!-- =====================================================================
       PATTERN: SVG primitives reference (architecture, 3-node) — Swiss
       USE:     Copy this <figure> as the starting template for any
                Architecture diagram in Swiss preset. Replace nodes/edges;
                keep the <defs>, paper-mask, type-tag and legend strip
                exactly as shown.
       Spec:    REQ-001 + Swiss preset accent (#002FA7) + focal tint (#DDE2EF)
       ===================================================================== -->
  <figure class="diagram">
    <svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SVG primitives reference (Swiss)">
      <defs>
        <!-- PATTERN: marker (chevron arrow heads, stroked path, not polygon fill)
             Three variants for Swiss preset:
               #arrow         — default / generic / internal (muted ink)
               #arrow-accent  — focal / primary flow (IKB)
               #arrow-link    — external / HTTP / API (lighter IKB) -->
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
          <path d="M2 1 L8 5 L2 9" fill="none" stroke="#444444"
                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
        <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
          <path d="M2 1 L8 5 L2 9" fill="none" stroke="#002FA7"
                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
        <marker id="arrow-link" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
          <path d="M2 1 L8 5 L2 9" fill="none" stroke="#3355BB"
                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>

      <!-- PATTERN: paper-mask Layer 1 — full-bleed rect, fill = resolved paper-token.
           Swiss paper hex (#f5f5f1) pre-flattened to solid hex per token resolver. -->
      <rect width="100%" height="100%" fill="#f5f5f1"/>

      <!-- =================================================================
           EDGES — draw before nodes so node rects mask edge tails cleanly.
           ================================================================= -->

      <!-- External user → CDN (HTTP/API, link marker) -->
      <line x1="208" y1="220" x2="288" y2="220"
            stroke="#3355BB" stroke-width="1.2" marker-end="url(#arrow-link)"/>
      <text x="248" y="212" fill="#3355BB" font-size="8"
            font-family="'JetBrains Mono', ui-monospace, monospace"
            text-anchor="middle" letter-spacing="0.06em">HTTPS</text>

      <!-- CDN → API (default internal arrow) -->
      <line x1="416" y1="220" x2="496" y2="220"
            stroke="#444444" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- API → DB (focal / primary flow, accent marker, IKB) -->
      <line x1="656" y1="220" x2="736" y2="220"
            stroke="#002FA7" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <text x="696" y="212" fill="#002FA7" font-size="8"

            text-anchor="middle" letter-spacing="0.06em">QUERY</text>

      <!-- =================================================================
           NODES — Swiss node-width whitelist {128, 160} (2 tiers used).
           ================================================================= -->

      <!-- ── External / User (128 wide, tier-1) ── -->
      <rect x="80" y="184" width="128" height="68" rx="0" fill="#f5f5f1"/>
      <rect x="80" y="184" width="128" height="68" rx="0"
            fill="#ebebe6" stroke="#6a6a6a" stroke-width="1"/>
      <rect x="88" y="192" width="28" height="12" rx="0"
            fill="transparent" stroke="#6a6a6a" stroke-width="0.8"/>
      <text x="100" y="200" fill="#6a6a6a" font-size="7"
            font-family="'JetBrains Mono', ui-monospace, monospace"
            text-anchor="middle" letter-spacing="0.08em">EXT</text>
      <text x="144" y="224" fill="#111111" font-size="12" font-weight="600"
            font-family="'Inter', system-ui, sans-serif"
            text-anchor="middle">Users</text>
      <text x="144" y="240" fill="#444444" font-size="9"
            font-family="'JetBrains Mono', ui-monospace, monospace"
            text-anchor="middle">Browser</text>

      <!-- ── CDN (128 wide, tier-1) ── -->
      <rect x="288" y="184" width="128" height="68" rx="0" fill="#f5f5f1"/>
      <rect x="288" y="184" width="128" height="68" rx="0"
            fill="#f0f0eb" stroke="#6a6a6a" stroke-width="1"/>
      <rect x="296" y="192" width="28" height="12" rx="0"
            fill="transparent" stroke="#6a6a6a" stroke-width="0.8"/>
      <text x="308" y="200" fill="#6a6a6a" font-size="7"
            font-family="'JetBrains Mono', ui-monospace, monospace"
            text-anchor="middle" letter-spacing="0.08em">CDN</text>
      <text x="352" y="224" fill="#111111" font-size="12" font-weight="600"
            font-family="'Inter', system-ui, sans-serif"
            text-anchor="middle">CloudFront</text>
      <text x="352" y="240" fill="#444444" font-size="9"
            font-family="'JetBrains Mono', ui-monospace, monospace"
            text-anchor="middle">edge cache</text>

      <!-- ── API (160 wide, tier-2, FOCAL — data-role="focal", #DDE2EF fill, IKB stroke) ── -->
      <rect x="496" y="184" width="160" height="68" rx="0" fill="#f5f5f1"/>
      <rect data-role="focal"
            x="496" y="184" width="160" height="68" rx="0"
            fill="#DDE2EF" stroke="#002FA7" stroke-width="1.4"/>
      <rect x="504" y="192" width="28" height="12" rx="0"
            fill="transparent" stroke="#002FA7" stroke-width="0.8"/>
      <text x="516" y="200" fill="#002FA7" font-size="7"
            font-family="'JetBrains Mono', ui-monospace, monospace"
            text-anchor="middle" letter-spacing="0.08em">API</text>
      <text x="576" y="224" fill="#111111" font-size="12" font-weight="600"
            font-family="'Inter', system-ui, sans-serif"
            text-anchor="middle">API Server</text>
      <text x="576" y="240" fill="#444444" font-size="9"
            font-family="'JetBrains Mono', ui-monospace, monospace"
            text-anchor="middle">FastAPI :8000</text>

      <!-- ── Database (128 wide, tier-1) ── -->
      <rect x="736" y="184" width="128" height="68" rx="0" fill="#f5f5f1"/>
      <rect x="736" y="184" width="128" height="68" rx="0"
            fill="#ebebe6" stroke="#444444" stroke-width="1"/>
      <rect x="744" y="192" width="28" height="12" rx="0"
            fill="transparent" stroke="#444444" stroke-width="0.8"/>
      <text x="756" y="200" fill="#444444" font-size="7"
            font-family="'JetBrains Mono', ui-monospace, monospace"
            text-anchor="middle" letter-spacing="0.08em">DB</text>
      <text x="800" y="224" fill="#111111" font-size="12" font-weight="600"
            font-family="'Inter', system-ui, sans-serif"
            text-anchor="middle">Database</text>
      <text x="800" y="240" fill="#444444" font-size="9"
            font-family="'JetBrains Mono', ui-monospace, monospace"
            text-anchor="middle">PostgreSQL</text>

      <!-- =================================================================
           LEGEND STRIP — bottom ~60px. Hairline rule + LEGEND tracked
           uppercase text + horizontal items. Required when viewBox height
           ≥ 400 (GATE-C).
           ================================================================= -->
      <line x1="60" y1="540" x2="940" y2="540"
            stroke="#e2e2dc" stroke-width="1"/>
      <text x="60" y="556" fill="#111111" font-size="9" font-weight="500"
            font-family="'JetBrains Mono', ui-monospace, monospace"
            letter-spacing="0.12em">LEGEND</text>

      <!-- Node-type swatches -->
      <rect x="140" y="548" width="16" height="12" rx="0"
            fill="#ebebe6" stroke="#6a6a6a" stroke-width="1"/>
      <text x="160" y="558" fill="#444444" font-size="9"
            font-family="'Inter', system-ui, sans-serif">External / User</text>

      <rect x="260" y="548" width="16" height="12" rx="0"
            fill="#f0f0eb" stroke="#6a6a6a" stroke-width="1"/>
      <text x="280" y="558" fill="#444444" font-size="9"
            font-family="'Inter', system-ui, sans-serif">Cloud / Service</text>

      <rect x="384" y="548" width="16" height="12" rx="0"
            fill="#DDE2EF" stroke="#002FA7" stroke-width="1.2"/>
      <text x="404" y="558" fill="#444444" font-size="9"
            font-family="'Inter', system-ui, sans-serif">Focal node</text>

      <rect x="490" y="548" width="16" height="12" rx="0"
            fill="#ebebe6" stroke="#444444" stroke-width="1"/>
      <text x="510" y="558" fill="#444444" font-size="9"
            font-family="'Inter', system-ui, sans-serif">Database</text>

      <!-- Arrow-type swatches -->
      <line x1="600" y1="554" x2="618" y2="554"
            stroke="#444444" stroke-width="1.2" marker-end="url(#arrow)"/>
      <text x="624" y="558" fill="#444444" font-size="9"
            font-family="'Inter', system-ui, sans-serif">Internal</text>

      <line x1="710" y1="554" x2="728" y2="554"
            stroke="#002FA7" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <text x="734" y="558" fill="#444444" font-size="9"
            font-family="'Inter', system-ui, sans-serif">Focal flow</text>

      <line x1="820" y1="554" x2="838" y2="554"
            stroke="#3355BB" stroke-width="1.2" marker-end="url(#arrow-link)"/>
      <text x="844" y="558" fill="#444444" font-size="9"
            font-family="'Inter', system-ui, sans-serif">HTTP / API</text>

      <!-- Swiss preset SVG passes validate-output.ts GATE-A through GATE-K.
           Copy as template; replace nodes/edges with your content. -->
    </svg>
    <figcaption>圖：SVG primitives 範例（chevron marker / paper-mask / type tag / legend strip）— Swiss preset，IKB 焦點。</figcaption>
  </figure>

  <footer>
    <span>{{FOOTER_LABEL}}</span>
    <span>{{CAPTURED_AT}}</span>
  </footer>

</article>

<script>
  // Activate TOC link for the section nearest the top of the viewport
  const sections = document.querySelectorAll('section[id]');
  const links    = document.querySelectorAll('.toc-wrap a');
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      links.forEach(l => l.classList.remove('active'));
      const lnk = document.querySelector(`.toc-wrap a[href="#${e.target.id}"]`);
      if (lnk) lnk.classList.add('active');
    });
  }, { threshold: 0.35 });
  sections.forEach(s => io.observe(s));
</script>
</body>
</html>
