<!--
  section-title.html — Swiss preset section title element (v1.3)
  Swiss signature: 3px accent left bar.
  Tokens: var(--accent), var(--text-primary), var(--text-muted).
-->
<header class="swiss-section-title">
  <h2 class="swiss-section-title-heading">Section Heading</h2>
  <p class="swiss-section-title-sub">Optional subtitle / kicker line</p>
</header>

<style>
  .swiss-section-title { border-left: 3px solid var(--accent); padding-left: 12px; margin: 32px 0 16px; }
  .swiss-section-title-heading { font-size: 18px; font-weight: 500; color: var(--text-primary); letter-spacing: -0.01em; margin: 0; }
  .swiss-section-title-sub { font-size: 12px; color: var(--text-muted); letter-spacing: 0.04em; text-transform: uppercase; margin: 4px 0 0; }
  em, i { font-style: normal; font-weight: 500; }
</style>
