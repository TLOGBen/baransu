<!DOCTYPE html>
<html lang="zh-Hant">
<!--
  gallery.html — Kami preset component gallery (v1.3)
  Purpose: visual inventory of every component skeleton for designer reference + /dev review.
  Tokens consumed: full canonical 36-name vocabulary via ../tokens.css.
  Class prefix: kami-*
-->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kami Component Gallery</title>
  <link rel="stylesheet" href="../tokens.css">
  <style>
    * { box-sizing: border-box; }
    body { background: var(--paper); color: var(--text-primary); font-family: var(--font-serif); margin: 0; padding: 56px 24px; }
    .kami-gallery-grid { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
    .kami-gallery-cell { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 20px 24px; }
    .kami-gallery-label { font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 12px; font-family: var(--font-mono); }
    .kami-gallery-title { font-size: 24px; font-weight: 500; letter-spacing: -0.01em; max-width: 1200px; margin: 0 auto 32px; border-left: 3px solid var(--accent); padding-left: 12px; }

    .kami-btn { display: inline-block; font-size: 13px; font-weight: 500; padding: 8px 16px; border-radius: var(--radius-md); border: none; cursor: pointer; margin-right: 8px; text-decoration: none; }
    .kami-btn-primary { background: var(--accent); color: var(--accent-on); }
    .kami-btn-secondary { background: var(--surface-strong); color: var(--text-primary); }
    .kami-tag { display: inline-block; background: var(--surface-strong); color: var(--accent); font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: var(--radius-sm); letter-spacing: 0.04em; text-transform: uppercase; margin-right: 4px; }
    .kami-input { width: 100%; background: var(--paper); border: none; box-shadow: var(--shadow-ring); border-radius: var(--radius-sm); padding: 8px 12px; font-family: var(--font-serif); font-size: 14px; color: var(--text-primary); }
    .kami-input:focus { outline: none; box-shadow: 0 0 0 2px var(--accent); }
    .kami-card { background: var(--paper); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px 20px; }
    .kami-card h4 { margin: 0 0 8px; font-size: 16px; font-weight: 500; }
    .kami-card p { margin: 0; font-size: 13px; color: var(--text-secondary); }
    .kami-metric-value { font-size: 32px; font-weight: 500; color: var(--accent); }
    .kami-metric-delta { font-size: 13px; color: var(--delta-up); }
    .kami-quote { border-left: 2px solid var(--accent); padding: 8px 0 8px 16px; color: var(--text-secondary); margin: 0; font-size: 14px; }
    .kami-section-title-demo { font-size: 18px; font-weight: 500; border-left: 3px solid var(--accent); padding-left: 12px; margin: 0; letter-spacing: -0.01em; }
    .kami-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .kami-table th, .kami-table td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border-soft); }
    .kami-table th { color: var(--text-secondary); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
    em, i { font-style: normal; font-weight: 500; }
  </style>
</head>
<body>

  <h1 class="kami-gallery-title">Component Gallery — Kami (IKB)</h1>

  <div class="kami-gallery-grid">

    <figure class="kami-gallery-cell">
      <div class="kami-gallery-label">Button</div>
      <button class="kami-btn kami-btn-primary">Primary</button>
      <button class="kami-btn kami-btn-secondary">Secondary</button>
      <figcaption class="kami-gallery-label" style="margin-top: 12px;">→ tag-button.html</figcaption>
    </figure>

    <figure class="kami-gallery-cell">
      <div class="kami-gallery-label">Tag / Badge</div>
      <span class="kami-tag">Active</span><span class="kami-tag">Beta</span><span class="kami-tag">v1.3</span>
      <figcaption class="kami-gallery-label" style="margin-top: 12px;">→ tag-button.html</figcaption>
    </figure>

    <figure class="kami-gallery-cell">
      <div class="kami-gallery-label">Input</div>
      <input class="kami-input" type="text" placeholder="搜尋條目…">
      <figcaption class="kami-gallery-label" style="margin-top: 12px;">box-shadow ring</figcaption>
    </figure>

    <figure class="kami-gallery-cell">
      <div class="kami-gallery-label">Card</div>
      <article class="kami-card">
        <h4>Card Title</h4>
        <p>Card body text at 13px, secondary color.</p>
      </article>
      <figcaption class="kami-gallery-label" style="margin-top: 12px;">→ card.html</figcaption>
    </figure>

    <figure class="kami-gallery-cell">
      <div class="kami-gallery-label">Metric</div>
      <div class="kami-metric-value">87.3%</div>
      <div class="kami-metric-delta">▲ 12.4 pts</div>
      <figcaption class="kami-gallery-label" style="margin-top: 12px;">→ metric.html</figcaption>
    </figure>

    <figure class="kami-gallery-cell">
      <div class="kami-gallery-label">Quote / Callout</div>
      <blockquote class="kami-quote">Pull quote with 2px accent left bar.</blockquote>
      <figcaption class="kami-gallery-label" style="margin-top: 12px;">→ quote-callout.html</figcaption>
    </figure>

    <figure class="kami-gallery-cell">
      <div class="kami-gallery-label">Section Title</div>
      <h2 class="kami-section-title-demo">Section Heading</h2>
      <figcaption class="kami-gallery-label" style="margin-top: 12px;">→ section-title.html</figcaption>
    </figure>

    <figure class="kami-gallery-cell">
      <div class="kami-gallery-label">Data Table</div>
      <table class="kami-table">
        <thead><tr><th>Metric</th><th>Value</th></tr></thead>
        <tbody><tr><td>Requests</td><td>1,234</td></tr><tr><td>Errors</td><td>3</td></tr></tbody>
      </table>
      <figcaption class="kami-gallery-label" style="margin-top: 12px;">→ data-table.html</figcaption>
    </figure>

  </div>

</body>
</html>
