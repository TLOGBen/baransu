<section data-layout="kpi-grid" class="kami-slide kami-slide--kpi">
  <h2 class="kami-kpi-heading">KPI Grid Heading</h2>
  <figure class="kami-kpi-figure">
    <ul class="kami-kpi-grid">
      <li class="kami-kpi-cell">
        <span class="kami-kpi-value">42.7</span>
        <span class="kami-kpi-unit">M</span>
        <span class="kami-kpi-label">Revenue</span>
      </li>
      <li class="kami-kpi-cell">
        <span class="kami-kpi-value">1,284</span>
        <span class="kami-kpi-label">Customers</span>
      </li>
      <li class="kami-kpi-cell">
        <span class="kami-kpi-value">2.1</span>
        <span class="kami-kpi-unit">%</span>
        <span class="kami-kpi-label">Churn</span>
      </li>
      <li class="kami-kpi-cell">
        <span class="kami-kpi-value">68</span>
        <span class="kami-kpi-label">NPS</span>
      </li>
    </ul>
    <figcaption class="kami-kpi-caption">KPI snapshot — 4-6 metrics at a glance.</figcaption>
  </figure>
</section>
