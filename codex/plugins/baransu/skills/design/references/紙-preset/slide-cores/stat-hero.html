<!--
---
layout_id: stat-hero
applies_to:
  bullet_count: "0"
  has_image: forbidden
  role: hero
---
Adapts to: single hero-stat slides (S11 in guizang baseline).
One enormous number with a short supporting line and provenance footnote.
Tokens consumed: var(--paper), var(--ink), var(--accent).
-->
<link rel="stylesheet" href="../tokens.css">
<style>
  .kami-slide--stat-hero { padding: 72px 80px; background: var(--paper); color: var(--ink);
    font-family: var(--font-serif); text-wrap: pretty;
    display: grid; grid-template-rows: auto 1fr auto; min-height: 600px; }
  .kami-stat-eyebrow { font-size: 15px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--accent); margin: 0; }
  .kami-stat-number { font-size: 180px; line-height: 1.0; margin: 16px 0 0;
    font-variant-numeric: tabular-nums lining-nums; color: var(--ink); }
  .kami-stat-unit { font-size: 64px; vertical-align: 0.35em; margin-left: 6px;
    color: var(--accent); }
  .kami-stat-support { font-size: 21px; line-height: 1.40; margin: 18px 0 0;
    max-width: 36ch; text-wrap: pretty; }
  .kami-stat-source { font-size: 13px; opacity: 0.6; margin: 28px 0 0; }
  .kami-stat-caption { margin-top: 12px; font-size: 13px; opacity: 0.6; }
</style>
<section data-layout="stat-hero" class="kami-slide kami-slide--stat-hero">
  <p class="kami-stat-eyebrow">Cycle-time impact</p>
  <div>
    <div class="kami-stat-number">47<span class="kami-stat-unit">%</span></div>
    <p class="kami-stat-support">faster median review cycle after the handoff envelope landed in three pilot teams.</p>
  </div>
  <div>
    <p class="kami-stat-source">Source: internal telemetry, weeks 11&#x2013;22 of 2024 (n = 312 reviews).</p>
    <figcaption class="kami-stat-caption">Stat hero — single oversized number</figcaption>
  </div>
</section>
