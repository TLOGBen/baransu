<!--

layout_id: compare
applies_to:
  bullet_count: "1-5"
  has_image: optional
  role: body
image_slot:
  aspect_ratio: "16:9"

---
Adapts to: row 5 of /book Stage 2B layout decision table.
Body slide for A vs B comparison: two parallel columns with matching structure.
Each column has its own sub-heading and short bullet list.
Tokens consumed: var(--paper), var(--ink), var(--accent), var(--accent-on).
-->
<section data-layout="compare" class="kami-slide kami-slide--compare">
  <h2 class="swiss-compare-heading">A vs B Heading</h2>
  <figure class="swiss-compare-figure">
    <div class="swiss-compare-grid">
      <div class="swiss-compare-col swiss-compare-col--a">
        <h3 class="swiss-compare-subhead">Option A</h3>
        <ul class="swiss-compare-bullets">
          <li class="swiss-compare-bullet">Trait one for A.</li>
          <li class="swiss-compare-bullet">Trait two for A.</li>
        </ul>
      </div>
      <div class="swiss-compare-col swiss-compare-col--b">
        <h3 class="swiss-compare-subhead">Option B</h3>
        <ul class="swiss-compare-bullets">
          <li class="swiss-compare-bullet">Trait one for B.</li>
          <li class="swiss-compare-bullet">Trait two for B.</li>
        </ul>
      </div>
    </div>
    <figcaption class="swiss-compare-caption">Comparison caption — what is being held constant.</figcaption>
  </figure>
</section>
