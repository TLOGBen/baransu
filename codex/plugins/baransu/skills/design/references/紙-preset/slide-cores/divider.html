<!--
---
layout_id: divider
applies_to:
  bullet_count: "0"
  has_image: forbidden
  role: section_divider
---
Adapts to: chapter transitions inside a long deck (S15 in guizang baseline).
Distinct from `section`: divider carries only a part-number and short title,
used to mark a *major* break (act / chapter), not every sub-section.
Tokens consumed: var(--paper), var(--ink), var(--accent).
-->
<link rel="stylesheet" href="../tokens.css">
<style>
  .kami-slide--divider { padding: 96px 96px; background: var(--paper); color: var(--ink);
    font-family: var(--font-serif); text-wrap: pretty;
    display: grid; grid-template-rows: 1fr auto auto 1fr; row-gap: 18px;
    min-height: 600px; }
  .kami-divider-eyebrow { font-size: 15px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--accent); margin: 0; align-self: end; }
  .kami-divider-rule { width: 64px; height: 1px; background: var(--accent); border: 0; margin: 0; }
  .kami-divider-title { font-size: 38px; line-height: 1.15; margin: 0;
    max-width: 22ch; text-wrap: pretty; }
  .kami-divider-caption { font-size: 13px; opacity: 0.6; margin: 0; align-self: end; }
</style>
<section data-layout="divider" class="kami-slide kami-slide--divider">
  <p class="kami-divider-eyebrow">Part Two</p>
  <hr class="kami-divider-rule">
  <h1 class="kami-divider-title">Where the envelope falls short</h1>
  <figcaption class="kami-divider-caption">Divider — major section transition</figcaption>
</section>
