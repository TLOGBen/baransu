<!--
---
layout_id: agenda
applies_to:
  bullet_count: "3-7"
  has_image: forbidden
  role: body
---
Adapts to: agenda / table-of-contents slides (S02 in guizang baseline).
Numbered list, 1-N items. Pairs with `toc` in the broader layout registry
but stays distinct: agenda is meeting-scoped, toc is document-scoped.
Tokens consumed: var(--paper), var(--ink), var(--accent), var(--border-soft).
-->
<link rel="stylesheet" href="../tokens.css">
<style>
  .google-slide--agenda { padding: 56px 72px; background: var(--paper); color: var(--ink);
    font-family: var(--font-sans); text-wrap: pretty; }
  .google-agenda-heading { font-size: 28px; line-height: 1.20; font-weight: 400;
    margin: 0 0 28px; }
  .google-agenda-list { list-style: none; counter-reset: agenda; padding: 0; margin: 0; }
  .google-agenda-item { counter-increment: agenda; display: grid;
    grid-template-columns: 56px 1fr; align-items: baseline; gap: 16px;
    padding: 14px 4px; border-bottom: 1px solid var(--border-soft); }
  .google-agenda-item::before { content: counter(agenda, decimal-leading-zero);
    font-size: 21px; color: var(--accent); font-variant-numeric: tabular-nums;
    font-weight: 500; }
  .google-agenda-label { font-size: 21px; line-height: 1.30; font-weight: 500; margin: 0; }
  .google-agenda-note  { font-size: 14px; color: var(--text-secondary); margin: 2px 0 0;
    line-height: 1.50; font-weight: 400; }
  .google-agenda-caption { margin-top: 24px; font-size: 13px; color: var(--text-faint); }
</style>
<section data-layout="agenda" class="google-slide google-slide--agenda">
  <h2 class="google-agenda-heading">Today&#x2019;s agenda</h2>
  <ol class="google-agenda-list">
    <li class="google-agenda-item"><h3 class="google-agenda-label">Where we are<br><span class="google-agenda-note">Quarterly telemetry recap</span></h3></li>
    <li class="google-agenda-item"><h3 class="google-agenda-label">What changed<br><span class="google-agenda-note">Notable incidents and learnings</span></h3></li>
    <li class="google-agenda-item"><h3 class="google-agenda-label">What ships next<br><span class="google-agenda-note">Roadmap commitments for the quarter</span></h3></li>
    <li class="google-agenda-item"><h3 class="google-agenda-label">Open questions<br><span class="google-agenda-note">Topics for the working session</span></h3></li>
  </ol>
  <figcaption class="google-agenda-caption">Agenda &#x2014; 1-N numbered topics</figcaption>
</section>
