<!--
---
layout_id: cover-quote
applies_to:
  bullet_count: "0"
  has_image: optional
  role: quote_cover
---
Pull-quote cover variant. Headline = large quote; subtext = attribution.
Adapts to: any /book slide whose content_type is `pull_quote` and slide_index is 1 or section_first.
Tokens consumed: var(--paper), var(--ink), var(--accent), var(--text-secondary).
-->
<section data-layout="cover-quote" class="google-slide google-slide--cover-quote">
  <header class="google-cover-quote-header">
    <blockquote class="google-cover-quote-mark">
      &ldquo;A pull-quote that anchors the deck&rsquo;s central thesis in one sentence.&rdquo;
    </blockquote>
    <p class="google-cover-quote-attribution">— Author or Source, Context</p>
  </header>
  <figcaption class="google-cover-caption">Quote cover — quote_cover</figcaption>
</section>
