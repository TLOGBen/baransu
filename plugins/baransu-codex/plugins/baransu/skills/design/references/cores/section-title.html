<!-- Section Title skeleton — brand left bar is the signature element -->
<style>
.section-title {
  font-family: var(--serif);
  font-size: 1.125rem;   /* ≈14pt */
  font-weight: 500;
  color: var(--near-black);
  margin: 2.5rem 0 0.75rem 0;
  border-left: 2.5px solid var(--brand);
  border-radius: 1.5px;
  padding-left: 0.6rem;
  line-height: 1.25;
}

/* Eyebrow — small label above section title */
.eyebrow {
  display: block;
  font-family: var(--mono);
  font-size: 0.6875rem; /* ≈9pt */
  font-weight: 600;
  color: var(--brand);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 0.4rem;
}

/* Chapter heading — larger, same left-bar treatment */
.chapter-heading {
  font-size: 1.375rem;
  font-weight: 500;
  color: var(--near-black);
  border-left: 3px solid var(--brand);
  border-radius: 2px;
  padding-left: 0.75rem;
  margin: 3rem 0 1rem 0;
  line-height: 1.20;
}

/* Horizontal rule divider — warm, subtle */
.section-rule {
  border: none;
  border-top: 0.5px solid var(--border);
  margin: 2rem 0;
}
/* Brand dotted rule (structured reports) */
.section-rule--brand {
  border-top: 0.5px dotted var(--brand);
}
</style>

<!-- Standard section title -->
<h2 class="section-title">Section Heading</h2>

<!-- With eyebrow label -->
<h2 class="section-title">
  <span class="eyebrow">Category Label</span>
  Section Heading With Context
</h2>

<!-- Chapter-level -->
<h1 class="chapter-heading">Chapter Heading</h1>

<hr class="section-rule">
