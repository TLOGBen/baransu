<!--
---
layout_id: table-heavy
applies_to:
  bullet_count: "0"
  has_image: forbidden
  role: body
---
Adapts to: comparative data slides (S13 in guizang baseline).
Zebra-row comparison table; 3-6 rows, 3-5 columns recommended.
Tokens consumed: var(--paper), var(--ink), var(--accent).
-->
<link rel="stylesheet" href="../tokens.css">
<style>
  .kami-slide--table-heavy { padding: 56px 64px; background: var(--paper); color: var(--ink);
    font-family: var(--font-serif); text-wrap: pretty; }
  .kami-table-heading { font-size: 28px; line-height: 1.20; margin: 0 0 24px; }
  .kami-table { width: 100%; border-collapse: collapse; font-size: 15px; }
  .kami-table thead th { text-align: left; padding: 12px 14px; font-size: 13px;
    letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent);
    border-bottom: 1px solid var(--ink); }
  .kami-table tbody td { padding: 12px 14px; border-bottom: 1px solid rgba(20, 20, 19, 0.18);
    vertical-align: top; }
  .kami-table tbody tr:nth-child(even) td { background: rgba(27, 54, 93, 0.05); }
  .kami-table-key { font-weight: 600; color: var(--accent); }
  .kami-table-caption { margin-top: 18px; font-size: 13px; opacity: 0.6; }
</style>
<section data-layout="table-heavy" class="kami-slide kami-slide--table-heavy">
  <h2 class="kami-table-heading">Plane comparison</h2>
  <table class="kami-table">
    <thead><tr>
      <th scope="col">Plane</th><th scope="col">Facilitator</th>
      <th scope="col">Question</th><th scope="col">Artifact</th>
    </tr></thead>
    <tbody>
      <tr><td class="kami-table-key">Agora</td><td>Sisyphus</td><td>What to do</td><td>Envelope</td></tr>
      <tr><td class="kami-table-key">Eidos</td><td>Daedalus</td><td>How to build</td><td>SDD</td></tr>
      <tr><td class="kami-table-key">Praxis</td><td>Heracles</td><td>Do the work</td><td>Report</td></tr>
      <tr><td class="kami-table-key">Yggdrasil</td><td>Janus</td><td>How it flows</td><td>State</td></tr>
      <tr><td class="kami-table-key">Inquisition</td><td>Rhadamanthys</td><td>How to verify</td><td>Audit</td></tr>
    </tbody>
  </table>
  <figcaption class="kami-table-caption">Table heavy — zebra-row comparison</figcaption>
</section>
