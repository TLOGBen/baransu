<!--
  quote-callout.html — Kami preset pull quote / callout element (v1.3)
  Tokens: var(--accent), var(--text-secondary), var(--text-primary), var(--text-faint).
-->
<figure class="kami-quote-callout">
  <blockquote class="kami-quote">
    Pull-quote text in 17px line-height 1.55, color text-secondary. 2px accent left bar is the Kami signature.
  </blockquote>
  <figcaption class="kami-quote-attribution">
    — Author Name, <span class="kami-quote-context">Context or Source</span>
  </figcaption>
</figure>

<style>
  .kami-quote-callout { margin: 24px 0; }
  .kami-quote { border-left: 2px solid var(--accent); padding: 8px 0 8px 16px; color: var(--text-secondary); font-size: 17px; line-height: 1.55; margin: 0; }
  .kami-quote-attribution { font-size: 12px; color: var(--text-faint); padding-left: 18px; margin-top: 8px; }
  .kami-quote-context { color: var(--text-secondary); }
  em, i { font-style: normal; font-weight: 500; }
</style>
