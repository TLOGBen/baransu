<!--
---
layout_id: testimonial
applies_to:
  bullet_count: "0"
  has_image: required
  role: body
---
Adapts to: customer or expert testimony slides (S10 in guizang baseline).
Portrait + pull-quote + attribution. Portrait <img> carries
`object-position: center 35%` to favour the upper-face crop.
Tokens consumed: var(--paper), var(--ink), var(--accent), var(--border).
-->
<link rel="stylesheet" href="../tokens.css">
<style>
  .swiss-slide--testimonial { padding: 64px 72px; background: var(--paper); color: var(--ink);
    font-family: var(--font-sans); font-weight: 500; text-wrap: pretty;
    display: grid; grid-template-columns: 220px 1fr; gap: 48px; align-items: center; }
  .swiss-testimonial-portrait { width: 220px; height: 280px; object-fit: cover;
    object-position: center 35%; border: 1px solid var(--border); }
  .swiss-testimonial-quote { font-size: 28px; line-height: 1.35; font-weight: 500;
    margin: 0 0 18px; text-wrap: pretty;
    quotes: "\201C" "\201D" "\2018" "\2019"; }
  .swiss-testimonial-quote::before { content: open-quote; color: var(--accent); margin-right: 4px; }
  .swiss-testimonial-quote::after  { content: close-quote; color: var(--accent); margin-left: 4px; }
  .swiss-testimonial-attrib { font-size: 15px; line-height: 1.55; color: var(--text-muted);
    margin: 0; font-style: normal; }
  .swiss-testimonial-attrib strong { color: var(--accent); font-weight: 700; }
  .swiss-testimonial-caption { grid-column: 1 / -1; margin-top: 24px; font-size: 13px;
    color: var(--text-faint); }
</style>
<section data-layout="testimonial" class="swiss-slide swiss-slide--testimonial">
  <img class="swiss-testimonial-portrait"
       src="../assets/portrait-placeholder.jpg"
       alt="Portrait of the speaker">
  <div class="swiss-testimonial-body">
    <p class="swiss-testimonial-quote">The handoff envelope cut our review cycle in half&#x2014;and made the disagreements obvious.</p>
    <p class="swiss-testimonial-attrib"><strong>Mei Tanaka</strong><br>Staff engineer, Platform Foundations</p>
  </div>
  <figcaption class="swiss-testimonial-caption">Testimonial &#x2014; portrait, pull-quote, attribution</figcaption>
</section>
