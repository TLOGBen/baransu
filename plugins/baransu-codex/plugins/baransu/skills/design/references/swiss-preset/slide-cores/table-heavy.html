<!--
---
layout_id: table-heavy
applies_to:
  bullet_count: "0"
  has_image: forbidden
  role: body
---
Adapts to: comparative data slides (S13 in guizang baseline).
Zebra-row comparison table; 3-6 rows, 3-5 columns recommended.
Tokens consumed: var(--paper), var(--ink), var(--accent), var(--border), var(--surface).
-->
<link rel="stylesheet" href="../tokens.css">
<style>
  .swiss-slide--table-heavy { padding: 56px 64px; background: var(--paper); color: var(--ink);
    font-family: var(--font-sans); font-weight: 500; text-wrap: pretty; }
  .swiss-table-heading { font-size: 28px; line-height: 1.20; letter-spacing: -0.01em;
    font-weight: 500; margin: 0 0 24px; }
  .swiss-table { width: 100%; border-collapse: collapse; font-size: 15px; }
  .swiss-table thead th { text-align: left; padding: 12px 14px; font-size: 13px;
    letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent);
    border-bottom: 1px solid var(--ink); font-weight: 500; }
  .swiss-table tbody td { padding: 12px 14px; border-bottom: 1px solid var(--border-soft);
    vertical-align: top; line-height: 1.55; }
  .swiss-table tbody tr:nth-child(even) td { background: var(--surface); }
  .swiss-table-key { font-weight: 700; color: var(--accent); }
  .swiss-table-caption { margin-top: 18px; font-size: 13px; color: var(--text-faint); }
</style>
<section data-layout="table-heavy" class="swiss-slide swiss-slide--table-heavy">
  <h2 class="swiss-table-heading">Plane comparison</h2>
  <table class="swiss-table">
    <thead><tr>
      <th scope="col">Plane</th><th scope="col">Facilitator</th>
      <th scope="col">Question</th><th scope="col">Artifact</th>
    </tr></thead>
    <tbody>
      <tr><td class="swiss-table-key">Agora</td><td>Sisyphus</td><td>What to do</td><td>Envelope</td></tr>
      <tr><td class="swiss-table-key">Eidos</td><td>Daedalus</td><td>How to build</td><td>SDD</td></tr>
      <tr><td class="swiss-table-key">Praxis</td><td>Heracles</td><td>Do the work</td><td>Report</td></tr>
      <tr><td class="swiss-table-key">Yggdrasil</td><td>Janus</td><td>How it flows</td><td>State</td></tr>
      <tr><td class="swiss-table-key">Inquisition</td><td>Rhadamanthys</td><td>How to verify</td><td>Audit</td></tr>
    </tbody>
  </table>
  <figcaption class="swiss-table-caption">Table heavy &#x2014; zebra-row comparison</figcaption>
</section>
