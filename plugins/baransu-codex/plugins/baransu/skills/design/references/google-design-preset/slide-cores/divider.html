<!--
---
layout_id: divider
applies_to:
  bullet_count: "0"
  has_image: forbidden
  role: section_divider
---
Adapts to: chapter transitions inside a long deck (S15 in guizang baseline).
Distinct from `section`: divider carries only a part-number and short title,
used to mark a *major* break (act / chapter), not every sub-section.
Tokens consumed: var(--paper), var(--ink), var(--accent), var(--radius-md).
-->
<link rel="stylesheet" href="../tokens.css">
<style>
  .google-slide--divider { padding: 96px 96px; background: var(--paper); color: var(--ink);
    font-family: var(--font-sans); text-wrap: pretty;
    display: grid; grid-template-rows: 1fr auto auto 1fr; row-gap: 20px;
    min-height: 600px; }
  .google-divider-eyebrow { font-size: 15px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--accent); font-weight: 500; margin: 0; align-self: end; }
  .google-divider-rule { width: 64px; height: 4px; background: var(--accent); border: 0;
    margin: 0; border-radius: var(--radius-md); }
  .google-divider-title { font-size: 38px; line-height: 1.15; letter-spacing: -0.01em;
    font-weight: 400; margin: 0; max-width: 22ch; text-wrap: pretty;
    color: var(--text-primary); }
  .google-divider-caption { font-size: 13px; color: var(--text-faint); margin: 0;
    align-self: end; }
</style>
<section data-layout="divider" class="google-slide google-slide--divider">
  <p class="google-divider-eyebrow">Part Two</p>
  <hr class="google-divider-rule">
  <h1 class="google-divider-title">Where the envelope falls short</h1>
  <figcaption class="google-divider-caption">Divider &#x2014; major section transition</figcaption>
</section>
