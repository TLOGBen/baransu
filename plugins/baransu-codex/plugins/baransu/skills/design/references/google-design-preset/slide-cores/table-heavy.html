<!--
---
layout_id: table-heavy
applies_to:
  bullet_count: "0"
  has_image: forbidden
  role: body
---
Adapts to: comparative data slides (S13 in guizang baseline).
Zebra-row comparison table; 3-6 rows, 3-5 columns recommended.
Tokens consumed: var(--paper), var(--ink), var(--accent), var(--border-soft),
  var(--surface).
-->
<link rel="stylesheet" href="../tokens.css">
<style>
  .google-slide--table-heavy { padding: 56px 64px; background: var(--paper); color: var(--ink);
    font-family: var(--font-sans); text-wrap: pretty; }
  .google-table-heading { font-size: 28px; line-height: 1.20; font-weight: 400;
    margin: 0 0 24px; }
  .google-table { width: 100%; border-collapse: separate; border-spacing: 0;
    font-size: 15px; border-radius: var(--radius-lg); overflow: hidden;
    box-shadow: var(--shadow-whisper); }
  .google-table thead th { text-align: left; padding: 14px 16px; font-size: 13px;
    letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent-on);
    background: var(--accent); font-weight: 500; }
  .google-table tbody td { padding: 14px 16px; border-bottom: 1px solid var(--border-soft);
    vertical-align: top; line-height: 1.55; }
  .google-table tbody tr:nth-child(even) td { background: var(--surface); }
  .google-table tbody tr:last-child td { border-bottom: 0; }
  .google-table-key { font-weight: 500; color: var(--accent); }
  .google-table-caption { margin-top: 18px; font-size: 13px; color: var(--text-faint); }
</style>
<section data-layout="table-heavy" class="google-slide google-slide--table-heavy">
  <h2 class="google-table-heading">Plane comparison</h2>
  <table class="google-table">
    <thead><tr>
      <th scope="col">Plane</th><th scope="col">Facilitator</th>
      <th scope="col">Question</th><th scope="col">Artifact</th>
    </tr></thead>
    <tbody>
      <tr><td class="google-table-key">Agora</td><td>Sisyphus</td><td>What to do</td><td>Envelope</td></tr>
      <tr><td class="google-table-key">Eidos</td><td>Daedalus</td><td>How to build</td><td>SDD</td></tr>
      <tr><td class="google-table-key">Praxis</td><td>Heracles</td><td>Do the work</td><td>Report</td></tr>
      <tr><td class="google-table-key">Yggdrasil</td><td>Janus</td><td>How it flows</td><td>State</td></tr>
      <tr><td class="google-table-key">Inquisition</td><td>Rhadamanthys</td><td>How to verify</td><td>Audit</td></tr>
    </tbody>
  </table>
  <figcaption class="google-table-caption">Table heavy &#x2014; zebra-row comparison</figcaption>
</section>
