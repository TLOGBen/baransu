<!-- Card skeleton — replace content, keep classes -->
<style>
.card {
  background: var(--ivory);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-md);
  padding: var(--space-xl) var(--space-xl);
  transition: box-shadow 0.2s ease-out;
}
.card:hover {
  box-shadow: var(--shadow-whisper);
}
.card-title {
  font-size: 1.125rem;
  font-weight: 500;
  color: var(--near-black);
  margin: 0 0 var(--space-md) 0;
}
.card-body {
  font-size: 0.9375rem;
  color: var(--dark-warm);
  line-height: 1.55;
  margin: 0;
}
/* Variant: featured card with brand border */
.card--featured {
  border-color: var(--brand);
  border-width: 1px;
}
/* Variant: dark card */
.card--dark {
  background: var(--dark-surface);
  color: var(--ivory);
  border-color: transparent;
}
</style>

<div class="card">
  <h3 class="card-title">Card Title</h3>
  <p class="card-body">
    Body text goes here. Keep line-height 1.55 for reading comfort.
    Cards use ivory background, 8px radius, 0.5px warm border.
  </p>
</div>

<!-- Featured variant -->
<div class="card card--featured">
  <h3 class="card-title">Featured Card</h3>
  <p class="card-body">Brand-color border signals this card is highlighted.</p>
</div>
