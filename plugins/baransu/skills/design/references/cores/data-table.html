<!-- Data Table skeletons -->
<style>
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--serif);
  font-size: 0.875rem; /* ≈9.5pt */
  margin: 1rem 0;
  break-inside: avoid;
}
.data-table th {
  text-align: left;
  font-weight: 500;
  color: var(--dark-warm);
  padding: 0.45rem 0.6rem;
  border-bottom: 1px solid var(--border);
}
.data-table td {
  padding: 0.375rem 0.6rem;
  border-bottom: 0.3px solid var(--border-soft);
  vertical-align: top;
  color: var(--near-black);
  line-height: 1.45;
}
/* Compact variant */
.data-table.compact {
  font-size: 0.8125rem;
}
.data-table.compact td,
.data-table.compact th {
  padding: 0.25rem 0.5rem;
}
/* Financial: right-align all but first column */
.data-table.financial td:not(:first-child),
.data-table.financial th:not(:first-child) {
  text-align: right;
  font-variant-numeric: tabular-nums;
}
/* Striped rows */
.data-table.striped tr:nth-child(even) td {
  background: var(--ivory);
}
/* Total row */
.data-table tr.total td {
  font-weight: 500;
  border-top: 1px solid var(--brand);
  border-bottom: none;
}
</style>

<!-- Standard table -->
<table class="data-table">
  <thead>
    <tr>
      <th>Column A</th>
      <th>Column B</th>
      <th>Column C</th>
    </tr>
  </thead>
  <tbody>
    <tr><td>Row 1, A</td><td>Row 1, B</td><td>Row 1, C</td></tr>
    <tr><td>Row 2, A</td><td>Row 2, B</td><td>Row 2, C</td></tr>
    <tr><td>Row 3, A</td><td>Row 3, B</td><td>Row 3, C</td></tr>
  </tbody>
</table>

<!-- Financial table with total row -->
<table class="data-table financial">
  <thead>
    <tr><th>Item</th><th>Q1</th><th>Q2</th><th>YoY</th></tr>
  </thead>
  <tbody>
    <tr><td>Revenue</td><td>1,200</td><td>1,450</td><td>+20.8%</td></tr>
    <tr><td>Cost</td><td>800</td><td>920</td><td>+15.0%</td></tr>
    <tr class="total"><td>Margin</td><td>400</td><td>530</td><td>+32.5%</td></tr>
  </tbody>
</table>
