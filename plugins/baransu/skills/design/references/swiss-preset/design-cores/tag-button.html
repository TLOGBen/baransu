<!--
  tag-button.html — Swiss preset tag + button elements (combined for ergonomic reference) (v1.3)
  Tokens: var(--accent), var(--accent-on), var(--surface-strong), var(--text-primary), var(--border), var(--radius-md), var(--radius-sm).
-->
<div class="swiss-tag-button-demo">
  <!-- Buttons -->
  <button class="swiss-btn swiss-btn-primary">Primary</button>
  <button class="swiss-btn swiss-btn-secondary">Secondary</button>
  <button class="swiss-btn swiss-btn-ghost">Ghost</button>
  <button class="swiss-btn swiss-btn-primary" disabled>Disabled</button>

  <!-- Tags / Badges -->
  <div class="swiss-tag-row">
    <span class="swiss-tag">Active</span>
    <span class="swiss-tag">Beta</span>
    <span class="swiss-tag">v1.3</span>
    <span class="swiss-tag swiss-tag-inverse">Inverse</span>
  </div>
</div>

<style>
  .swiss-tag-button-demo { display: flex; flex-direction: column; gap: 12px; }
  /* Button */
  .swiss-btn { display: inline-block; font-family: var(--font-sans); font-size: 13px; font-weight: 500; padding: 8px 16px; border-radius: var(--radius-md); border: none; cursor: pointer; margin-right: 8px; text-decoration: none; letter-spacing: 0; }
  .swiss-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .swiss-btn-primary { background: var(--accent); color: var(--accent-on); }
  .swiss-btn-primary:hover:not(:disabled) { box-shadow: 0 0 0 1px var(--accent); }
  .swiss-btn-secondary { background: var(--surface-strong); color: var(--text-primary); }
  .swiss-btn-secondary:hover:not(:disabled) { box-shadow: var(--shadow-whisper); }
  .swiss-btn-ghost { background: transparent; color: var(--accent); border: 1px solid var(--border); }
  .swiss-btn-ghost:hover:not(:disabled) { background: var(--surface-strong); }
  /* Tag */
  .swiss-tag-row { display: flex; gap: 6px; }
  .swiss-tag { display: inline-block; background: var(--surface-strong); color: var(--accent); font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: var(--radius-sm); letter-spacing: 0.04em; text-transform: uppercase; }
  .swiss-tag-inverse { background: var(--accent); color: var(--accent-on); }
  em, i { font-style: normal; font-weight: 500; }
</style>
