<!--
---
layout_id: divider
applies_to:
  bullet_count: "0"
  has_image: forbidden
  role: section_divider
---
Adapts to: chapter transitions inside a long deck (S15 in guizang baseline).
Distinct from `section`: divider carries only a part-number and short title,
used to mark a *major* break (act / chapter), not every sub-section.
Tokens consumed: var(--paper), var(--ink), var(--accent).
-->
<link rel="stylesheet" href="../tokens.css">
<style>
  .swiss-slide--divider { padding: 96px 96px; background: var(--paper); color: var(--ink);
    font-family: var(--font-sans); font-weight: 500; text-wrap: pretty;
    display: grid; grid-template-rows: 1fr auto auto 1fr; row-gap: 18px;
    min-height: 600px; }
  .swiss-divider-eyebrow { font-size: 15px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--accent); font-weight: 500; margin: 0; align-self: end; }
  .swiss-divider-rule { width: 64px; height: 3px; background: var(--accent); border: 0; margin: 0; }
  .swiss-divider-title { font-size: 38px; line-height: 1.15; letter-spacing: -0.01em;
    font-weight: 500; margin: 0; max-width: 22ch; text-wrap: pretty; }
  .swiss-divider-caption { font-size: 13px; color: var(--text-faint); margin: 0;
    align-self: end; }
</style>
<section data-layout="divider" class="swiss-slide swiss-slide--divider">
  <p class="swiss-divider-eyebrow">Part Two</p>
  <hr class="swiss-divider-rule">
  <h1 class="swiss-divider-title">Where the envelope falls short</h1>
  <figcaption class="swiss-divider-caption">Divider &#x2014; major section transition</figcaption>
</section>
