<!--
---
layout_id: stat-hero
applies_to:
  bullet_count: "0"
  has_image: forbidden
  role: hero
---
Adapts to: single hero-stat slides (S11 in guizang baseline).
One enormous number with a short supporting line and provenance footnote.
Tokens consumed: var(--paper), var(--ink), var(--accent), var(--text-muted).
-->
<link rel="stylesheet" href="../tokens.css">
<style>
  .swiss-slide--stat-hero { padding: 72px 80px; background: var(--paper); color: var(--ink);
    font-family: var(--font-sans); font-weight: 500; text-wrap: pretty;
    display: grid; grid-template-rows: auto 1fr auto; min-height: 600px; }
  .swiss-stat-eyebrow { font-size: 15px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--accent); font-weight: 500; margin: 0; }
  .swiss-stat-number { font-size: 180px; line-height: 1.0; font-weight: 500;
    margin: 16px 0 0; font-variant-numeric: tabular-nums lining-nums;
    letter-spacing: -0.02em; color: var(--ink); }
  .swiss-stat-unit { font-size: 64px; vertical-align: 0.35em; margin-left: 6px;
    color: var(--accent); font-weight: 500; }
  .swiss-stat-support { font-size: 21px; line-height: 1.50; font-weight: 500;
    margin: 18px 0 0; max-width: 36ch; text-wrap: pretty; }
  .swiss-stat-source { font-size: 13px; color: var(--text-muted); margin: 28px 0 0;
    line-height: 1.55; }
  .swiss-stat-caption { margin-top: 12px; font-size: 13px; color: var(--text-faint); }
</style>
<section data-layout="stat-hero" class="swiss-slide swiss-slide--stat-hero">
  <p class="swiss-stat-eyebrow">Cycle-time impact</p>
  <div>
    <div class="swiss-stat-number">47<span class="swiss-stat-unit">%</span></div>
    <p class="swiss-stat-support">faster median review cycle after the handoff envelope landed in three pilot teams.</p>
  </div>
  <div>
    <p class="swiss-stat-source">Source: internal telemetry, weeks 11&#x2013;22 of 2024 (n = 312 reviews).</p>
    <figcaption class="swiss-stat-caption">Stat hero &#x2014; single oversized number</figcaption>
  </div>
</section>
