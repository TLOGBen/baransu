<!DOCTYPE html>
<html lang="zh-Hant">
<!--
  dashboard.html — Google Material 3 preset dashboard mockup (v1.3)
  Purpose: contextual mockup showing components composed into a real admin dashboard.
  Static SVG only — no JS, no external resources (per KD#5 + Check F).
  Tokens consumed: full canonical 38-name vocabulary via ../tokens.css.
  Class prefix: google-*
-->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Material Dashboard Mockup</title>
  <link rel="stylesheet" href="../tokens.css">
  <style>
    * { box-sizing: border-box; }
    body { background: var(--paper); color: var(--text-primary); font-family: var(--font-sans); margin: 0; }
    .google-dashboard { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }

    .google-sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 24px 20px; }
    .google-sidebar-brand { font-size: 14px; font-weight: 500; border-left: 3px solid var(--accent); padding-left: 8px; margin-bottom: 32px; }
    .google-nav-item { display: block; font-size: 13px; color: var(--text-secondary); padding: 8px 0; text-decoration: none; }
    .google-nav-item.active { color: var(--accent); font-weight: 500; }

    .google-main { padding: 32px 40px; }
    .google-page-title { font-size: 24px; font-weight: 500; letter-spacing: -0.01em; border-left: 3px solid var(--accent); padding-left: 12px; margin: 0 0 32px; }

    .google-kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
    .google-kpi-card { background: var(--paper); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px 20px; }
    .google-kpi-label { font-size: 11px; color: var(--text-faint); letter-spacing: 0.04em; text-transform: uppercase; }
    .google-kpi-value { font-size: 32px; font-weight: 500; margin: 4px 0; }
    .google-kpi-delta { font-size: 12px; }
    .google-kpi-delta.up { color: var(--delta-up); }
    .google-kpi-delta.down { color: var(--delta-down); }

    .google-row { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
    .google-panel { background: var(--paper); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 20px 24px; }
    .google-panel-title { font-size: 14px; font-weight: 500; margin: 0 0 16px; color: var(--text-secondary); }

    .google-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .google-table th, .google-table td { text-align: left; padding: 8px 0; border-bottom: 1px solid var(--border-soft); }
    .google-table th { color: var(--text-secondary); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }

    .google-chart-bar svg { width: 100%; height: auto; display: block; }

    em, i { font-style: normal; font-weight: 500; }
  </style>
</head>
<body>

  <div class="google-dashboard">

    <aside class="google-sidebar">
      <div class="google-sidebar-brand">BARANSU</div>
      <a href="#" class="google-nav-item active">Overview</a>
      <a href="#" class="google-nav-item">Telemetry</a>
      <a href="#" class="google-nav-item">Skills</a>
      <a href="#" class="google-nav-item">Settings</a>
    </aside>

    <main class="google-main">
      <h1 class="google-page-title">Overview · 2026-05</h1>

      <div class="google-kpi-grid">
        <article class="google-kpi-card">
          <div class="google-kpi-label">Total Sessions</div>
          <div class="google-kpi-value">8,243</div>
          <div class="google-kpi-delta up">▲ 12.4%</div>
        </article>
        <article class="google-kpi-card">
          <div class="google-kpi-label">Avg Score</div>
          <div class="google-kpi-value">4.21</div>
          <div class="google-kpi-delta up">▲ 0.18</div>
        </article>
        <article class="google-kpi-card">
          <div class="google-kpi-label">Poor Verdicts</div>
          <div class="google-kpi-value">73</div>
          <div class="google-kpi-delta down">▼ 8 vs prev</div>
        </article>
        <article class="google-kpi-card">
          <div class="google-kpi-label">Active Skills</div>
          <div class="google-kpi-value">16</div>
          <div class="google-kpi-delta">no change</div>
        </article>
      </div>

      <div class="google-row">
        <section class="google-panel google-chart-bar">
          <h2 class="google-panel-title">Weekly Score Trend</h2>
          <svg viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg" aria-label="Weekly bar chart">
            <g fill="var(--accent)">
              <rect x="20"  y="120" width="40" height="60"/>
              <rect x="80"  y="100" width="40" height="80"/>
              <rect x="140" y="80"  width="40" height="100"/>
              <rect x="200" y="70"  width="40" height="110"/>
              <rect x="260" y="50"  width="40" height="130"/>
              <rect x="320" y="40"  width="40" height="140"/>
              <rect x="380" y="30"  width="40" height="150"/>
              <rect x="440" y="20"  width="40" height="160"/>
            </g>
            <line x1="0" y1="180" x2="600" y2="180" stroke="var(--border)" stroke-width="1"/>
            <text x="20"  y="195" fill="var(--text-faint)" font-size="10" font-family="var(--font-sans)">W14</text>
            <text x="200" y="195" fill="var(--text-faint)" font-size="10" font-family="var(--font-sans)">W17</text>
            <text x="380" y="195" fill="var(--text-faint)" font-size="10" font-family="var(--font-sans)">W20</text>
          </svg>
        </section>

        <section class="google-panel">
          <h2 class="google-panel-title">Recent Activity</h2>
          <table class="google-table">
            <thead><tr><th>Skill</th><th>Status</th></tr></thead>
            <tbody>
              <tr><td>/grade</td><td>✓ Pass</td></tr>
              <tr><td>/triage</td><td>✓ Pass</td></tr>
              <tr><td>/bridge</td><td>– Skipped</td></tr>
              <tr><td>/execute</td><td>✓ Pass</td></tr>
              <tr><td>/dev</td><td>✓ Pass</td></tr>
            </tbody>
          </table>
        </section>
      </div>

    </main>
  </div>

</body>
</html>
