<!--
  metric.html — Google Material 3 preset KPI metric element (v1.3)
  Tokens: var(--accent), var(--text-faint), var(--text-secondary), var(--delta-up), var(--delta-down), var(--font-mono), var(--paper), var(--border).
-->
<article class="google-metric">
  <header>
    <p class="google-metric-label">Active Users</p>
  </header>
  <div class="google-metric-body">
    <span class="google-metric-value">8,243</span>
    <span class="google-metric-unit">users</span>
  </div>
  <footer class="google-metric-delta google-metric-delta--up">
    ▲ 12.4% vs last week
  </footer>
</article>

<style>
  .google-metric { background: var(--paper); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px 20px; }
  .google-metric-label { font-size: 11px; color: var(--text-faint); letter-spacing: 0.04em; text-transform: uppercase; margin: 0; }
  .google-metric-body { display: flex; align-items: baseline; gap: 6px; margin: 6px 0; }
  .google-metric-value { font-size: 32px; font-weight: 500; color: var(--accent); font-family: var(--font-mono); font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
  .google-metric-unit { font-size: 12px; color: var(--text-faint); }
  .google-metric-delta { font-size: 12px; }
  .google-metric-delta--up { color: var(--delta-up); }
  .google-metric-delta--down { color: var(--delta-down); }
  em, i { font-style: normal; font-weight: 500; }
</style>
