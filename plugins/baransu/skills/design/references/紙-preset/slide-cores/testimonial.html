<!--
---
layout_id: testimonial
applies_to:
  bullet_count: "0"
  has_image: required
  role: body
---
Adapts to: customer or expert testimony slides (S10 in guizang baseline).
Portrait + pull-quote + attribution. Portrait <img> carries
`object-position: center 35%` to favour the upper-face crop.
Tokens consumed: var(--paper), var(--ink), var(--accent).
-->
<link rel="stylesheet" href="../tokens.css">
<style>
  .kami-slide--testimonial { padding: 64px 72px; background: var(--paper); color: var(--ink);
    font-family: var(--font-serif); text-wrap: pretty;
    display: grid; grid-template-columns: 220px 1fr; gap: 48px; align-items: center; }
  .kami-testimonial-portrait { width: 220px; height: 280px; object-fit: cover;
    object-position: center 35%; border: 1px solid var(--ink); }
  .kami-testimonial-quote { font-size: 28px; line-height: 1.35; margin: 0 0 18px;
    text-wrap: pretty; quotes: "\201C" "\201D" "\2018" "\2019"; }
  .kami-testimonial-quote::before { content: open-quote; color: var(--accent); margin-right: 4px; }
  .kami-testimonial-quote::after  { content: close-quote; color: var(--accent); margin-left: 4px; }
  .kami-testimonial-attrib { font-size: 15px; line-height: 1.5; opacity: 0.78; }
  .kami-testimonial-attrib strong { color: var(--accent); font-weight: 600; }
  .kami-testimonial-caption { grid-column: 1 / -1; margin-top: 24px; font-size: 13px; opacity: 0.6; }
</style>
<section data-layout="testimonial" class="kami-slide kami-slide--testimonial">
  <img class="kami-testimonial-portrait"
       src="../assets/portrait-placeholder.jpg"
       alt="Portrait of the speaker">
  <div class="kami-testimonial-body">
    <p class="kami-testimonial-quote">The handoff envelope cut our review cycle in half&#x2014;and made the disagreements obvious.</p>
    <p class="kami-testimonial-attrib"><strong>Mei Tanaka</strong><br>Staff engineer, Platform Foundations</p>
  </div>
  <figcaption class="kami-testimonial-caption">Testimonial — portrait, pull-quote, attribution</figcaption>
</section>
