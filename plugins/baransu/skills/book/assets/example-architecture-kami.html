<!DOCTYPE html>
<html lang="zh-TW">
<!--
  example-architecture-kami.html — v1 唯一完整 Architecture example
  Design system: Kami (見 references/design-token-resolver.md Layer 2)
  Purpose: 對所有 LLM 後續產出之 Architecture 圖提供「show-by-example」視覺基準。

  Spec 對應:
    REQ-001 Scenario 1-4 : marker / 兩層 paper-mask / focal / legend strip
    REQ-005 Scenario 1   : 自包含、Kami 風格、過 validate-output.ts 全部 gate

  主題: book skill 內部 5 層架構（指令 / 規格 / 模板 / 驗證 / 資產）
  Focal: 規格層（references/）— v1 升級的主戰場
-->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>book skill 內部 5 層架構 · Architecture</title>
<style>
  /* ── Kami design tokens（Layer 2 — 16 tokens，all solid hex） ──
     Source of truth: references/design-token-resolver.md §Layer 2.
     本 example 為自包含 HTML，需於 :root 內聯定義（與 golden-template 對齊）。 */
  :root {
    --parchment:         #f5f4ed;
    --ivory:             #faf9f5;
    --warm-sand:         #e8e6dc;
    --dark-surface:      #30302e;
    --deep-dark:         #141413;
    --brand:             #1B365D;
    --brand-light:       #2D5A8A;
    --near-black:        #141413;
    --dark-warm:         #3d3d3a;
    --olive:             #504e49;
    --stone:             #6b6a64;
    --charcoal:          #4d4c48;
    --border:            #e8e6dc;
    --border-soft:       #e5e3d8;
    --brand-tint:        #EEF2F7;
    --brand-tint-strong: #E4ECF5;
    --line:              #e5e3d8;
    --hover:             #e8e6dc;
    --accent-bg:         #EEF2F7;
    --warm-bg:           #f1ece4;
    --warn-border:       #b05c28;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--parchment);
    font-family: 'TsangerJinKai02','Noto Serif TC','Source Han Serif TC',
                 Charter, Georgia, 'Palatino Linotype', serif;
    color: var(--near-black);
    line-height: 1.75;
    font-size: 16px;
  }

  .paper {
    background: var(--ivory);
    max-width: 960px;
    margin: 40px auto 80px;
    padding: 56px 64px;
    box-shadow: 0 2px 8px rgba(0,0,0,.08), 0 12px 40px rgba(0,0,0,.06);
    border-radius: 2px;
    position: relative;
  }
  .paper::before {
    content: '';
    position: absolute;
    top: 0; left: 44px;
    width: 1px; height: 100%;
    background: var(--border-soft);
  }

  .kicker {
    font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--brand); margin-bottom: 14px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }
  h1 {
    font-size: 28px; font-weight: 700; line-height: 1.25;
    letter-spacing: -.01em; margin-bottom: 12px;
  }
  .subtitle {
    font-size: 15.5px; color: var(--dark-warm);
    margin-bottom: 32px; padding-bottom: 32px;
    border-bottom: 1px solid var(--line);
  }

  figure.diagram { margin: 28px 0; text-align: center; }
  figure.diagram figcaption {
    font-size: 12px; color: var(--stone);
    margin-top: 8px; font-style: italic;
    font-family: sans-serif;
  }
  svg { display: block; margin: 0 auto; max-width: 100%; }
</style>
</head>
<body>

<article class="paper">

  <header>
    <p class="kicker">ARCHITECTURE · BOOK SKILL</p>
    <h1>book skill 內部 5 層架構</h1>
    <p class="subtitle">
      v1 把 13 型架構移植進指令層、規格層、模板層、資產層；驗證層擴充三類 gate 守門。
    </p>
  </header>

  <!-- =====================================================================
       Architecture diagram — book skill 5 層架構
       Focal: 規格層 references/（v1 升級主戰場）
       ===================================================================== -->
  <figure class="diagram">
    <svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg" role="img"
         aria-label="book skill 內部 5 層架構">
      <defs>
        <!-- markers: 三型箭頭，皆有對應引用（GATE-D 要求 bijective）；
             GATE-K：chevron path，禁 <polygon> filled triangle -->
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
          <path d="M2 1 L8 5 L2 9" fill="none" stroke="#504e49"
                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
        <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
          <path d="M2 1 L8 5 L2 9" fill="none" stroke="#1B365D"
                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
        <marker id="arrow-link" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
          <path d="M2 1 L8 5 L2 9" fill="none" stroke="#2D5A8A"
                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>

      <!-- Layer 1 paper-mask（GATE-B：first visual child = rect width="100%" fill="#hex"） -->
      <rect width="100%" height="100%" fill="#f5f4ed"/>
      <!-- Layer 2 paper-mask（dotted overlay 預設 OFF；保留註解以對齊規格） -->
      <!-- <rect width="100%" height="100%" fill="url(#dots)" opacity="0.55"/> -->

      <!-- =================================================================
           EDGES — 先畫線，後畫節點，z-order 讓節點壓住箭頭尾。
           ================================================================= -->

      <!-- 指令層 → 規格層 (accent / focal flow) -->
      <line x1="280" y1="152" x2="368" y2="272"
            stroke="#1B365D" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <text x="304" y="200" fill="#1B365D" font-size="8"
            font-family="'Geist Mono', ui-monospace, monospace"
            text-anchor="middle" letter-spacing="0.06em">DRIVES</text>

      <!-- 規格層 → 模板層 (default / internal) -->
      <line x1="528" y1="272" x2="620" y2="152"
            stroke="#504e49" stroke-width="1.2" marker-end="url(#arrow)"/>
      <text x="570" y="206" fill="#504e49" font-size="8"
            font-family="'Geist Mono', ui-monospace, monospace"
            text-anchor="middle" letter-spacing="0.06em">SHAPES</text>

      <!-- 模板層 → 資產層 (default / internal) -->
      <line x1="780" y1="152" x2="820" y2="272"
            stroke="#504e49" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- 資產層 → 驗證層 (link / 回饋路徑) -->
      <line x1="892" y1="304" x2="560" y2="432"
            stroke="#2D5A8A" stroke-width="1.2" marker-end="url(#arrow-link)"/>
      <text x="732" y="356" fill="#2D5A8A" font-size="8"
            font-family="'Geist Mono', ui-monospace, monospace"
            text-anchor="middle" letter-spacing="0.06em">GATES</text>

      <!-- =================================================================
           NODES — 5 層，依據 ctx 規劃；focal 在規格層。
           每節點：opaque paper rect（mask 箭頭尾）+ styled rect + type tag
                   + label + sublabel。
           ================================================================= -->

      <!-- ① 指令層 — SKILL.md（CMD，backend / 預設灰） -->
      <rect x="120" y="120" width="160" height="64" rx="6" fill="#f5f4ed"/>
      <rect x="120" y="120" width="160" height="64" rx="6"
            fill="#ebeae5" stroke="#6b6a64" stroke-width="1"/>
      <rect x="128" y="128" width="32" height="12" rx="2"
            fill="transparent" stroke="#6b6a64" stroke-width="0.8"/>
      <text x="144" y="137" fill="#6b6a64" font-size="7"
            font-family="'Geist Mono', ui-monospace, monospace"
            text-anchor="middle" letter-spacing="0.08em">CMD</text>
      <text x="200" y="160" fill="#141413" font-size="13" font-weight="600"
            font-family="'Geist', system-ui, sans-serif"
            text-anchor="middle">SKILL.md</text>
      <text x="200" y="176" fill="#504e49" font-size="9"
            font-family="'Geist Mono', ui-monospace, monospace"
            text-anchor="middle">指令層 / orchestrator</text>

      <!-- ② 規格層 — references/（SPEC，FOCAL） -->
      <rect x="368" y="240" width="160" height="64" rx="6" fill="#f5f4ed"/>
      <rect data-role="focal"
            x="368" y="240" width="160" height="64" rx="6"
            fill="#EEF2F7" stroke="#1B365D" stroke-width="1.4"/>
      <rect x="376" y="248" width="32" height="12" rx="2"
            fill="transparent" stroke="#1B365D" stroke-width="0.8"/>
      <text x="392" y="257" fill="#1B365D" font-size="7"
            font-family="'Geist Mono', ui-monospace, monospace"
            text-anchor="middle" letter-spacing="0.08em">SPEC</text>
      <text x="448" y="280" fill="#141413" font-size="13" font-weight="600"
            font-family="'Geist', system-ui, sans-serif"
            text-anchor="middle">references/</text>
      <text x="448" y="296" fill="#504e49" font-size="9"
            font-family="'Geist Mono', ui-monospace, monospace"
            text-anchor="middle">規格層 / 13 型 + tokens</text>

      <!-- ③ 模板層 — golden-template.html（TPL，backend） -->
      <rect x="620" y="120" width="160" height="64" rx="6" fill="#f5f4ed"/>
      <rect x="620" y="120" width="160" height="64" rx="6"
            fill="#f1f0eb" stroke="#6b6a64" stroke-width="1"/>
      <rect x="628" y="128" width="28" height="12" rx="2"
            fill="transparent" stroke="#6b6a64" stroke-width="0.8"/>
      <text x="642" y="137" fill="#6b6a64" font-size="7"
            font-family="'Geist Mono', ui-monospace, monospace"
            text-anchor="middle" letter-spacing="0.08em">TPL</text>
      <text x="700" y="160" fill="#141413" font-size="13" font-weight="600"
            font-family="'Geist', system-ui, sans-serif"
            text-anchor="middle">golden-template.html</text>
      <text x="700" y="176" fill="#504e49" font-size="9"
            font-family="'Geist Mono', ui-monospace, monospace"
            text-anchor="middle">模板層 / 起手骨架</text>

      <!-- ④ 資產層 — assets/（AST，store） -->
      <rect x="820" y="240" width="144" height="64" rx="6" fill="#f5f4ed"/>
      <rect x="820" y="240" width="144" height="64" rx="6"
            fill="#ebeae5" stroke="#504e49" stroke-width="1"/>
      <rect x="828" y="248" width="28" height="12" rx="2"
            fill="transparent" stroke="#504e49" stroke-width="0.8"/>
      <text x="842" y="257" fill="#504e49" font-size="7"
            font-family="'Geist Mono', ui-monospace, monospace"
            text-anchor="middle" letter-spacing="0.08em">AST</text>
      <text x="892" y="280" fill="#141413" font-size="12" font-weight="600"
            font-family="'Geist', system-ui, sans-serif"
            text-anchor="middle">assets/</text>
      <text x="892" y="296" fill="#504e49" font-size="9"
            font-family="'Geist Mono', ui-monospace, monospace"
            text-anchor="middle">example HTML</text>

      <!-- ⑤ 驗證層 — validate-output.ts（VLD，backend） -->
      <rect x="400" y="400" width="160" height="64" rx="6" fill="#f5f4ed"/>
      <rect x="400" y="400" width="160" height="64" rx="6"
            fill="#ebeae5" stroke="#6b6a64" stroke-width="1"/>
      <rect x="408" y="408" width="28" height="12" rx="2"
            fill="transparent" stroke="#6b6a64" stroke-width="0.8"/>
      <text x="422" y="417" fill="#6b6a64" font-size="7"
            font-family="'Geist Mono', ui-monospace, monospace"
            text-anchor="middle" letter-spacing="0.08em">VLD</text>
      <text x="480" y="440" fill="#141413" font-size="13" font-weight="600"
            font-family="'Geist', system-ui, sans-serif"
            text-anchor="middle">validate-output.ts</text>
      <text x="480" y="456" fill="#504e49" font-size="9"
            font-family="'Geist Mono', ui-monospace, monospace"
            text-anchor="middle">驗證層 / 5 gate</text>

      <!-- =================================================================
           LEGEND STRIP — 底部 ~60px hairline + LEGEND text + horizontal items
           涵蓋本圖使用的節點類型（focal / backend / store）+ 箭頭類型
           （default / accent / link）。GATE-C 必過。
           ================================================================= -->
      <line x1="60" y1="540" x2="940" y2="540"
            stroke="#e5e3d8" stroke-width="1"/>
      <text x="60" y="558" fill="#141413" font-size="9" font-weight="500"
            font-family="'Geist Mono', ui-monospace, monospace"
            letter-spacing="0.12em">LEGEND</text>

      <!-- Node-type swatches -->
      <rect x="140" y="550" width="14" height="10" rx="2"
            fill="#ebeae5" stroke="#6b6a64" stroke-width="1"/>
      <text x="160" y="559" fill="#504e49" font-size="9"
            font-family="'Geist', system-ui, sans-serif">Backend</text>

      <rect x="232" y="550" width="14" height="10" rx="2"
            fill="#EEF2F7" stroke="#1B365D" stroke-width="1.2"/>
      <text x="252" y="559" fill="#504e49" font-size="9"
            font-family="'Geist', system-ui, sans-serif">Focal</text>

      <rect x="306" y="550" width="14" height="10" rx="2"
            fill="#ebeae5" stroke="#504e49" stroke-width="1"/>
      <text x="326" y="559" fill="#504e49" font-size="9"
            font-family="'Geist', system-ui, sans-serif">Store</text>

      <!-- Arrow-type swatches -->
      <line x1="400" y1="555" x2="418" y2="555"
            stroke="#504e49" stroke-width="1.2" marker-end="url(#arrow)"/>
      <text x="424" y="559" fill="#504e49" font-size="9"
            font-family="'Geist', system-ui, sans-serif">Internal</text>

      <line x1="510" y1="555" x2="528" y2="555"
            stroke="#1B365D" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <text x="534" y="559" fill="#504e49" font-size="9"
            font-family="'Geist', system-ui, sans-serif">Focal flow</text>

      <line x1="630" y1="555" x2="648" y2="555"
            stroke="#2D5A8A" stroke-width="1.2" marker-end="url(#arrow-link)"/>
      <text x="654" y="559" fill="#504e49" font-size="9"
            font-family="'Geist', system-ui, sans-serif">Feedback / link</text>
    </svg>
    <figcaption>圖：book skill 5 層架構（focal = 規格層）</figcaption>
  </figure>

</article>

</body>
</html>
