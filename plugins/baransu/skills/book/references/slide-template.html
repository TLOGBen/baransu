<!DOCTYPE html>
<html lang="zh-TW">
<!--
  slide-template.html — book skill slide reference template
  Design system: Kami (see design/references/paper-preset.md)
  Purpose: Show-by-example contract for Claude when generating slide HTML
           in Stage 3§6 (--format ppt/all path). Agent reads this before
           generating slide content so the output matches the 5 layout types.

  Canvas: 960×540px — maps to pptxgenjs LAYOUT_WIDE (13.333" × 7.5")

  LAYOUT TYPES (data-layout attribute):
    cover   — title page: h1 + subtitle + optional meta
    section — chapter divider: h2 centered on brand-tint background
    content — standard content: h3 + bullet list (3–5 items) + optional figure
    data    — full-width chart/table: h3 + full-width figure placeholder
    closing — closing slide: summary sentence + optional call-to-action

  CONSTRAINTS (enforced by validate-output.ts downstream):
    • No rgba() — all colors are solid hex Kami tokens
    • No CSS gradients (linear-gradient, radial-gradient, etc.)
    • No background-image CSS property — use <img> for images
    • Text only in <p> or <h*> tags, never directly in <div>
    • Every .slide must carry a data-layout attribute

  KAMI COLOR TOKENS:
    --parchment   #f5f4ed   warm off-white background (cover)
    --brand       #1B365D   deep navy (headings, accents)
    --ivory       #faf9f5   neutral light background (content, data)
    --brand-tint  #EEF2F7   pale blue-grey (section divider)
    --near-black  #141413   body text
    --olive       #504e49   secondary text / meta
-->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=960, initial-scale=1.0">
  <title>Slide Template — Kami Design System</title>
  <style>
    /* ── Kami design tokens ── */
    :root {
      --parchment:  #f5f4ed;
      --brand:      #1B365D;
      --ivory:      #faf9f5;
      --brand-tint: #EEF2F7;
      --near-black: #141413;
      --olive:      #504e49;
    }

    /* ── Canvas reset ── */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 960px;
      height: 540px;
      margin: 0;
      padding: 0;
      font-family: 'TsangerJinKai02', Georgia, serif;
      color: var(--near-black);
      overflow: hidden;
    }

    /* ── Shared slide container ── */
    .slide {
      width: 960px;
      height: 540px;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 60px 80px;
      overflow: hidden;
    }

    /* ── COVER layout ── */
    .slide[data-layout="cover"] {
      background-color: var(--parchment);
      align-items: flex-start;
      justify-content: flex-end;
      padding-bottom: 72px;
    }

    .slide[data-layout="cover"] h1 {
      font-size: 52px;
      font-weight: 700;
      line-height: 1.2;
      color: var(--brand);
      margin-bottom: 16px;
    }

    .slide[data-layout="cover"] .subtitle {
      font-size: 22px;
      font-weight: 400;
      color: var(--olive);
      margin-bottom: 10px;
    }

    .slide[data-layout="cover"] .meta {
      font-size: 14px;
      color: var(--olive);
      letter-spacing: 0.04em;
    }

    /* ── SECTION layout ── */
    .slide[data-layout="section"] {
      background-color: var(--brand-tint);
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .slide[data-layout="section"] h2 {
      font-size: 42px;
      font-weight: 700;
      color: var(--brand);
      text-align: center;
      width: 100%;
    }

    /* ── CONTENT layout ── */
    .slide[data-layout="content"] {
      background-color: var(--ivory);
      align-items: flex-start;
      justify-content: flex-start;
      padding-top: 56px;
    }

    .slide[data-layout="content"] h3 {
      font-size: 30px;
      font-weight: 700;
      color: var(--brand);
      margin-bottom: 24px;
    }

    .slide[data-layout="content"] ul {
      list-style: none;
      padding: 0;
      margin: 0;
      flex: 1;
    }

    .slide[data-layout="content"] ul li {
      font-size: 18px;
      color: var(--near-black);
      padding: 6px 0;
      padding-left: 20px;
      position: relative;
    }

    .slide[data-layout="content"] ul li::before {
      content: '–';
      position: absolute;
      left: 0;
      color: var(--olive);
    }

    .slide[data-layout="content"] figure {
      position: absolute;
      right: 60px;
      top: 50%;
      transform: translateY(-50%);
      width: 300px;
      height: 280px;
    }

    /* ── DATA layout ── */
    .slide[data-layout="data"] {
      background-color: var(--ivory);
      align-items: flex-start;
      justify-content: flex-start;
      padding-top: 48px;
    }

    .slide[data-layout="data"] h3 {
      font-size: 28px;
      font-weight: 700;
      color: var(--brand);
      margin-bottom: 20px;
    }

    .slide[data-layout="data"] figure {
      width: 100%;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── CLOSING layout ── */
    .slide[data-layout="closing"] {
      background-color: var(--parchment);
      align-items: flex-start;
      justify-content: center;
    }

    .slide[data-layout="closing"] .summary {
      font-size: 26px;
      font-weight: 500;
      color: var(--brand);
      line-height: 1.5;
      max-width: 700px;
      margin-bottom: 20px;
    }

    .slide[data-layout="closing"] .cta {
      font-size: 16px;
      color: var(--olive);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════════════
       LAYOUT 1: COVER
       Use: First slide — title, subtitle, optional metadata line
       ══════════════════════════════════════════ -->
  <div class="slide" data-layout="cover">
    <h1>投影片主標題</h1>
    <p class="subtitle">副標題：一句話點明簡報核心主旨</p>
    <p class="meta">作者 · 日期 · 機構（選填）</p>
  </div>

  <!-- ══════════════════════════════════════════
       LAYOUT 2: SECTION
       Use: Chapter divider — large centered heading on brand-tint background
       ══════════════════════════════════════════ -->
  <div class="slide" data-layout="section">
    <h2>第一章：章節標題</h2>
  </div>

  <!-- ══════════════════════════════════════════
       LAYOUT 3: CONTENT
       Use: Standard content slide — heading + 3–5 bullets + optional figure
       ══════════════════════════════════════════ -->
  <div class="slide" data-layout="content">
    <h3>內容頁標題</h3>
    <ul>
      <li>第一條重點敘述，清晰扼要</li>
      <li>第二條重點敘述，支撐論點</li>
      <li>第三條重點敘述，提供佐證</li>
      <li>第四條重點敘述（可選）</li>
      <li>第五條重點敘述（可選）</li>
    </ul>
    <!-- Optional SVG figure placeholder — replace with inline SVG when has_svg=true -->
    <figure aria-label="圖示佔位區">
      <svg width="300" height="280" viewBox="0 0 300 280"
           xmlns="http://www.w3.org/2000/svg"
           role="img" aria-label="內容圖示佔位">
        <rect width="300" height="280" fill="#EEF2F7" rx="8"/>
        <text x="150" y="148" text-anchor="middle"
              font-family="Georgia, serif" font-size="14"
              fill="#504e49">圖示佔位 300×280</text>
      </svg>
    </figure>
  </div>

  <!-- ══════════════════════════════════════════
       LAYOUT 4: DATA
       Use: Full-width chart or data table — heading + full-width figure
       ══════════════════════════════════════════ -->
  <div class="slide" data-layout="data">
    <h3>資料 / 圖表標題</h3>
    <!-- Full-width figure: replace inner SVG with actual chart or <table> -->
    <figure aria-label="圖表佔位區">
      <svg width="800" height="380" viewBox="0 0 800 380"
           xmlns="http://www.w3.org/2000/svg"
           role="img" aria-label="資料圖表佔位">
        <rect width="800" height="380" fill="#EEF2F7" rx="8"/>
        <text x="400" y="198" text-anchor="middle"
              font-family="Georgia, serif" font-size="16"
              fill="#504e49">圖表 / 資料表佔位 800×380</text>
      </svg>
    </figure>
  </div>

  <!-- ══════════════════════════════════════════
       LAYOUT 5: CLOSING
       Use: Final slide — summary sentence + optional call-to-action
       ══════════════════════════════════════════ -->
  <div class="slide" data-layout="closing">
    <p class="summary">摘要句：以一到兩句話收束簡報核心訊息，留下鮮明印象。</p>
    <p class="cta">行動呼籲 / 聯絡方式（選填）</p>
  </div>

</body>
</html>
