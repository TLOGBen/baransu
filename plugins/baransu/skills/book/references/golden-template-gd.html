<!DOCTYPE html>
<html lang="{{LANG}}">
<!--
  golden-template-gd.html — book skill reference template (google-design / M3 preset)
  Design system: Material Design 3 (M3) baseline
  Purpose: Show-by-example the structure, tokens, and SVG style that
           every google-design-preset book output must follow.

  Token source: project root DESIGN.md (Layer 1) →
                design-token-resolver.md Layer 2 (google-design preset) →
                per-type derived rules (Layer 3).
  All token values rendered to SVG/CSS MUST be solid hex (`^#[0-9a-fA-F]{3,8}$`);
  `rgba(` MUST NOT appear in any rendered output.

  M3 invariants honored here:
    - Roboto Flex as primary body font, Roboto fallback, system-ui
    - M3 baseline primary #6750A4 (accent / focal stroke)
    - M3 background #FEF7FF (paper)
    - M3 surface tint #F0E5FF (focal fill)
    - Rounded corners 12-16px feel (whisper shadow OK)
    - Editorial standards retained: text-wrap pretty + curly quotes

  TEMPLATE SLOTS (replace when generating):
    {{LANG}}          → zh-TW or en
    {{TITLE}}         → document title
    {{KICKER}}        → 2–4 word category label
    {{SUBTITLE}}      → one-sentence summary
    {{SOURCE_URL}}    → original source URL
    {{CAPTURED_AT}}   → ISO 8601 date
    {{TOC_ITEMS}}     → <a href="#s1">...</a> list of section links
    {{SECTIONS}}      → rendered <section id="sN"> blocks
    {{FOOTER_LABEL}}  → e.g. "整理自 @author · Original Title"
-->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
  /* ── google-design / M3 tokens (Layer 2, solid hex) ──
     Source of truth: references/design-token-resolver.md §Layer 2 (M3 row).
     M3 baseline scheme: primary #6750A4, background #FEF7FF, surface tint #F0E5FF. */
  :root {
    --paper:             #FEF7FF;  /* M3 background */
    --ivory:             #FFFBFE;  /* M3 surface */
    --warm-sand:         #E7E0EC;  /* surface variant — interactive */
    --dark-surface:      #1C1B1F;  /* M3 dark surface */
    --deep-dark:         #141218;  /* M3 dark background */
    --accent:            #6750A4;  /* M3 primary — accent / focal stroke */
    --accent-light:      #7F67BE;  /* M3 primary light for dark surface */
    --near-black:        #1D1B20;  /* M3 on-background */
    --dark-warm:         #313033;  /* secondary text */
    --olive:             #49454F;  /* M3 on-surface-variant */
    --stone:             #79747E;  /* M3 outline */
    --charcoal:          #3B383E;  /* dark muted text */
    --border:            #CAC4D0;  /* M3 outline-variant */
    --border-soft:       #E7E0EC;  /* surface variant */
    --brand-tint:        #F0E5FF;  /* M3 primary container surface tint, focal fill */
    --brand-tint-strong: #E8DEF8;  /* tag background, standard */
    /* Aliases for class hooks (do NOT use in SVG attributes). */
    --line:              #E7E0EC;
    --hover:             #EADDFF;
    --accent-bg:         #F0E5FF;  /* solid-hex equivalent of primary@7%-on-paper */
    --warm-bg:           #FFEDC9;  /* M3 secondary container equivalent (warm warn) */
    --warn-border:       #7D5260;  /* M3 tertiary */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--paper);
    font-family: 'Roboto Flex', Roboto, system-ui, sans-serif;
    color: var(--near-black);
    line-height: 1.55;
    font-size: 16px;
    text-wrap: pretty;
  }

  /* ── Paper sheet ──
     M3 preset: whisper elevation, 16px rounded corners, outline-variant border. */
  .paper {
    background: var(--ivory);
    max-width: 760px;
    margin: 40px auto 80px;
    padding: 64px 72px;
    /* M3 elevation level 1 (whisper) */
    box-shadow:
      0 1px 2px rgba(0,0,0,.05),
      0 1px 3px rgba(103,80,164,.05);
    border-radius: 16px;
    border: 1px solid var(--border-soft);
    position: relative;
  }

  /* ── Sticky TOC sidebar ── */
  .toc-wrap {
    position: fixed;
    top: 48px;
    left: calc(50% - 380px - 200px);
    width: 180px;
    display: none;
  }
  @media (min-width: 1160px) { .toc-wrap { display: block; } }
  .toc-wrap h3 {
    font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--stone); margin-bottom: 10px;
  }
  .toc-wrap a {
    display: block; padding: 4px 0 4px 12px;
    font-size: 12.5px; line-height: 1.55;
    text-decoration: none;
    color: var(--olive);
    border-left: 2px solid transparent;
    border-radius: 0 12px 12px 0;
    transition: color .15s, border-color .15s, background .15s;
  }
  .toc-wrap a:hover, .toc-wrap a.active {
    color: var(--accent); border-left-color: var(--accent);
    background: var(--hover);
  }

  /* ── Header ── */
  .kicker {
    font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 14px;
    font-weight: 500;
  }
  h1 {
    font-size: 30px; font-weight: 500; line-height: 1.2;
    letter-spacing: 0; margin-bottom: 12px;
    text-wrap: pretty;
    color: var(--near-black);
  }
  .subtitle {
    font-size: 15.5px; color: var(--dark-warm);
    margin-bottom: 32px; padding-bottom: 32px;
    border-bottom: 1px solid var(--line);
  }
  .meta {
    display: block; margin-top: 6px;
    font-size: 12px; color: var(--stone);
  }

  /* ── Sections ── */
  section { margin-bottom: 52px; }
  section:last-of-type { margin-bottom: 0; }

  h2 {
    font-size: 18px; font-weight: 500;
    margin-bottom: 16px; padding-bottom: 8px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 10px;
    text-wrap: pretty;
  }
  .sec-num {
    font-size: 10px; font-weight: 500; letter-spacing: .08em;
    color: var(--accent); background: var(--accent-bg);
    padding: 4px 12px; border-radius: 12px; flex-shrink: 0;
  }

  p { margin-bottom: 14px; text-wrap: pretty; }
  p:last-child { margin-bottom: 0; }
  strong { font-weight: 600; }

  /* ── Callout variants ── */
  .callout {
    background: var(--accent-bg);
    border-left: 4px solid var(--accent);
    padding: 14px 18px; margin: 20px 0;
    font-size: 14.5px;
    border-radius: 0 12px 12px 0;
  }
  .callout.warm {
    background: var(--warm-bg);
    border-left-color: var(--warn-border);
  }

  /* ── SVG figures ── */
  figure.diagram {
    margin: 28px 0; text-align: center;
  }
  figure.diagram figcaption {
    font-size: 12px; color: var(--stone);
    margin-top: 8px;
    font-style: normal;
    letter-spacing: .02em;
  }
  svg { display: block; margin: 0 auto; max-width: 100%; }

  /* ── Comparison table ── */
  table.cmp {
    width: 100%; border-collapse: collapse;
    font-size: 14px; margin: 20px 0;
  }
  table.cmp th {
    padding: 12px 16px; text-align: left;
    font-size: 11px; letter-spacing: .06em; text-transform: uppercase;
    background: var(--hover); color: var(--olive);
    border-bottom: 1px solid var(--accent);
  }
  table.cmp td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    vertical-align: top;
  }
  table.cmp tr:last-child td { border-bottom: none; }
  .badge {
    display: inline-block; font-size: 10px; letter-spacing: .04em;
    padding: 2px 10px; border-radius: 8px; vertical-align: middle; margin-left: 4px;
    font-weight: 500;
  }
  .badge.yes { background: var(--accent-bg); color: var(--accent); }
  .badge.no  { background: var(--hover); color: var(--stone); }

  /* ── Card grid ── */
  .card-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 20px 0;
  }
  .card {
    border: 1px solid var(--line); border-radius: 12px;
    padding: 16px 18px;
    background: var(--ivory);
    transition: box-shadow .15s, transform .15s;
  }
  .card:hover {
    /* M3 elevation level 2 on hover */
    box-shadow:
      0 1px 2px rgba(0,0,0,.06),
      0 2px 6px rgba(103,80,164,.10);
    transform: translateY(-1px);
  }
  .card h3 {
    font-size: 13px; font-weight: 600; margin-bottom: 8px;
    display: flex; align-items: center; gap: 7px;
  }
  .card p { font-size: 13px; color: var(--dark-warm); margin: 0; }
  .card .icon {
    width: 24px; height: 24px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0;
    background: var(--accent-bg); color: var(--accent);
  }

  /* ── Footer ── */
  footer {
    margin-top: 52px; padding-top: 24px;
    border-top: 1px solid var(--line);
    font-size: 12px; color: var(--stone);
    display: flex; justify-content: space-between; align-items: center;
  }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .paper { padding: 40px 28px; margin: 0; border-radius: 0; }
    .card-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- TOC sidebar (auto-populated) -->
<nav class="toc-wrap" id="toc">
  <h3>目錄</h3>
  {{TOC_ITEMS}}
</nav>

<article class="paper">

  <header>
    <p class="kicker">{{KICKER}}</p>
    <h1>{{TITLE}}</h1>
    <p class="subtitle">
      {{SUBTITLE}}
      <span class="meta">來源：<a href="{{SOURCE_URL}}">{{SOURCE_URL}}</a> · {{CAPTURED_AT}}</span>
    </p>
  </header>

  {{SECTIONS}}

  <!-- =====================================================================
       PATTERN: SVG primitives reference (architecture, 3-node) — google-design
       USE:     Copy this <figure> as the starting template for any
                Architecture diagram in google-design preset. Replace
                nodes/edges; keep the <defs>, paper-mask, type-tag and
                legend strip exactly as shown.
       Spec:    REQ-001 + M3 primary (#6750A4) + surface tint (#F0E5FF)
       ===================================================================== -->
  <figure class="diagram">
    <svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SVG primitives reference (google-design)">
      <defs>
        <!-- PATTERN: marker (chevron arrow heads, stroked path, not polygon fill)
             Three variants for google-design preset:
               #arrow         — default / generic / internal (M3 outline)
               #arrow-accent  — focal / primary flow (M3 primary)
               #arrow-link    — external / HTTP / API (M3 primary light) -->
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
          <path d="M2 1 L8 5 L2 9" fill="none" stroke="#49454F"
                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
        <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
          <path d="M2 1 L8 5 L2 9" fill="none" stroke="#6750A4"

        <marker id="arrow-link" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
          <path d="M2 1 L8 5 L2 9" fill="none" stroke="#7F67BE"
                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>

      <!-- PATTERN: paper-mask Layer 1 — full-bleed rect, fill = resolved paper-token.
           M3 background hex (#FEF7FF) pre-flattened to solid hex per token resolver. -->
      <rect width="100%" height="100%" fill="#FEF7FF"/>

      <!-- =================================================================
           EDGES — draw before nodes so node rects mask edge tails cleanly.
           ================================================================= -->

      <!-- External user → CDN (HTTP/API, link marker) -->
      <line x1="208" y1="220" x2="288" y2="220"
            stroke="#7F67BE" stroke-width="1.2" marker-end="url(#arrow-link)"/>
      <text x="248" y="212" fill="#7F67BE" font-size="8"
            font-family="'Roboto Mono', ui-monospace, monospace"
            text-anchor="middle" letter-spacing="0.06em">HTTPS</text>

      <!-- CDN → API (default internal arrow) -->
      <line x1="416" y1="220" x2="496" y2="220"
            stroke="#49454F" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- API → DB (focal / primary flow, accent marker, M3 primary) -->

            stroke="#6750A4" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <text x="696" y="212" fill="#6750A4" font-size="8"

           NODES — google-design node-width whitelist {128, 160} (2 tiers used).

           ================================================================= -->

      <rect x="80" y="184" width="128" height="68" rx="12" fill="#FEF7FF"/>
      <rect x="80" y="184" width="128" height="68" rx="12"
            fill="#E7E0EC" stroke="#79747E" stroke-width="1"/>
      <rect x="92" y="192" width="28" height="12" rx="4"
            fill="transparent" stroke="#79747E" stroke-width="0.8"/>
      <text x="104" y="200" fill="#79747E" font-size="7"
            font-family="'Roboto Mono', ui-monospace, monospace"
            text-anchor="middle" letter-spacing="0.08em">EXT</text>
      <text x="144" y="224" fill="#1D1B20" font-size="12" font-weight="500"
            font-family="'Roboto Flex', Roboto, sans-serif"
            text-anchor="middle">Users</text>
      <text x="144" y="240" fill="#49454F" font-size="9"
            font-family="'Roboto Mono', ui-monospace, monospace"
            text-anchor="middle">Browser</text>

      <!-- ── CDN (128 wide, tier-1) ── -->
      <rect x="288" y="184" width="128" height="68" rx="12" fill="#FEF7FF"/>
      <rect x="288" y="184" width="128" height="68" rx="12"
            fill="#EADDFF" stroke="#79747E" stroke-width="1"/>
      <rect x="300" y="192" width="28" height="12" rx="4"
            fill="transparent" stroke="#79747E" stroke-width="0.8"/>
      <text x="312" y="200" fill="#79747E" font-size="7"
            font-family="'Roboto Mono', ui-monospace, monospace"
            text-anchor="middle" letter-spacing="0.08em">CDN</text>
      <text x="352" y="224" fill="#1D1B20" font-size="12" font-weight="500"
            font-family="'Roboto Flex', Roboto, sans-serif"
            text-anchor="middle">CloudFront</text>
      <text x="352" y="240" fill="#49454F" font-size="9"
            font-family="'Roboto Mono', ui-monospace, monospace"
            text-anchor="middle">edge cache</text>

      <!-- ── API (160 wide, tier-2, FOCAL — data-role="focal", #F0E5FF fill, M3 primary stroke) ── -->
      <rect x="496" y="184" width="160" height="68" rx="12" fill="#FEF7FF"/>
      <rect data-role="focal"
            x="496" y="184" width="160" height="68" rx="12"
            fill="#F0E5FF" stroke="#6750A4" stroke-width="1.4"/>
      <rect x="508" y="192" width="28" height="12" rx="4"
            fill="transparent" stroke="#6750A4" stroke-width="0.8"/>
      <text x="520" y="200" fill="#6750A4" font-size="7"
            font-family="'Roboto Mono', ui-monospace, monospace"
            text-anchor="middle" letter-spacing="0.08em">API</text>
      <text x="576" y="224" fill="#1D1B20" font-size="12" font-weight="500"
            font-family="'Roboto Flex', Roboto, sans-serif"
            text-anchor="middle">API Server</text>
      <text x="576" y="240" fill="#49454F" font-size="9"
            font-family="'Roboto Mono', ui-monospace, monospace"
            text-anchor="middle">FastAPI :8000</text>

      <!-- ── Database (128 wide, tier-1) ── -->
      <rect x="736" y="184" width="128" height="68" rx="12" fill="#FEF7FF"/>
      <rect x="736" y="184" width="128" height="68" rx="12"
            fill="#E7E0EC" stroke="#49454F" stroke-width="1"/>
      <rect x="748" y="192" width="28" height="12" rx="4"
            fill="transparent" stroke="#49454F" stroke-width="0.8"/>
      <text x="760" y="200" fill="#49454F" font-size="7"
            font-family="'Roboto Mono', ui-monospace, monospace"
            text-anchor="middle" letter-spacing="0.08em">DB</text>
      <text x="800" y="224" fill="#1D1B20" font-size="12" font-weight="500"
            font-family="'Roboto Flex', Roboto, sans-serif"
            text-anchor="middle">Database</text>
      <text x="800" y="240" fill="#49454F" font-size="9"
            font-family="'Roboto Mono', ui-monospace, monospace"
            text-anchor="middle">PostgreSQL</text>

      <!-- =================================================================
           LEGEND STRIP — bottom ~60px. Hairline rule + LEGEND tracked
           uppercase text + horizontal items. Required when viewBox height
           ≥ 400 (GATE-C).
           ================================================================= -->
      <line x1="60" y1="540" x2="940" y2="540"
            stroke="#E7E0EC" stroke-width="1"/>
      <text x="60" y="556" fill="#1D1B20" font-size="9" font-weight="500"
            font-family="'Roboto Mono', ui-monospace, monospace"
            letter-spacing="0.12em">LEGEND</text>

      <!-- Node-type swatches -->
      <rect x="140" y="548" width="16" height="12" rx="4"
            fill="#E7E0EC" stroke="#79747E" stroke-width="1"/>
      <text x="160" y="558" fill="#49454F" font-size="9"
            font-family="'Roboto Flex', Roboto, sans-serif">External / User</text>

      <rect x="260" y="548" width="16" height="12" rx="4"
            fill="#EADDFF" stroke="#79747E" stroke-width="1"/>
      <text x="280" y="558" fill="#49454F" font-size="9"
            font-family="'Roboto Flex', Roboto, sans-serif">Cloud / Service</text>

      <rect x="384" y="548" width="16" height="12" rx="4"
            fill="#F0E5FF" stroke="#6750A4" stroke-width="1.2"/>
      <text x="404" y="558" fill="#49454F" font-size="9"
            font-family="'Roboto Flex', Roboto, sans-serif">Focal node</text>

      <rect x="490" y="548" width="16" height="12" rx="4"
            fill="#E7E0EC" stroke="#49454F" stroke-width="1"/>
      <text x="510" y="558" fill="#49454F" font-size="9"
            font-family="'Roboto Flex', Roboto, sans-serif">Database</text>

      <!-- Arrow-type swatches -->
      <line x1="600" y1="554" x2="618" y2="554"
            stroke="#49454F" stroke-width="1.2" marker-end="url(#arrow)"/>
      <text x="624" y="558" fill="#49454F" font-size="9"
            font-family="'Roboto Flex', Roboto, sans-serif">Internal</text>

      <line x1="710" y1="554" x2="728" y2="554"
            stroke="#6750A4" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <text x="734" y="558" fill="#49454F" font-size="9"
            font-family="'Roboto Flex', Roboto, sans-serif">Focal flow</text>

      <line x1="820" y1="554" x2="838" y2="554"
            stroke="#7F67BE" stroke-width="1.2" marker-end="url(#arrow-link)"/>
      <text x="844" y="558" fill="#49454F" font-size="9"
            font-family="'Roboto Flex', Roboto, sans-serif">HTTP / API</text>

      <!-- google-design preset SVG passes validate-output.ts GATE-A through GATE-K.
           Copy as template; replace nodes/edges with your content. -->
    </svg>
    <figcaption>圖：SVG primitives 範例（chevron marker / paper-mask / type tag / legend strip）— google-design preset，M3 primary 焦點。</figcaption>
  </figure>

  <footer>
    <span>{{FOOTER_LABEL}}</span>
    <span>{{CAPTURED_AT}}</span>
  </footer>

</article>

<script>
  // Activate TOC link for the section nearest the top of the viewport
  const sections = document.querySelectorAll('section[id]');
  const links    = document.querySelectorAll('.toc-wrap a');
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      links.forEach(l => l.classList.remove('active'));
      const lnk = document.querySelector(`.toc-wrap a[href="#${e.target.id}"]`);
      if (lnk) lnk.classList.add('active');
    });
  }, { threshold: 0.35 });
  sections.forEach(s => io.observe(s));
</script>
</body>
</html>
